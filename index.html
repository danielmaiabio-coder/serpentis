function playSlackSound(){
  const s = SLACK_SOUNDS.find(x=>x.id===slackSoundPref);
  if(!s||!s.url) return;
  try{ new Audio(s.url).play(); }catch(e){}
}

function slackCheckNewMsgs(channel, msgs){
  if(!msgs.length) return;
  if(slackMutedChannels.has(channel)) return;
  const latest = msgs[msgs.length-1];
  const prev = slackLastMsgTs[channel];
  if(prev && parseFloat(latest.ts) > parseFloat(prev)){
    playSlackSound();
  }
  slackLastMsgTs[channel] = latest.ts;
}

window.slackSetSound = function(id){

window.slackToggleMute = function(id){
  if(slackMutedChannels.has(id)) slackMutedChannels.delete(id);

};

const SLACK_API = '/api/slack';
let slackPollInterval = null;
let slackActiveChannel = null;
let slackUsers = {};
let slackChannels = [];
let slackHiddenChannels = new Set();

async function slackCall(action, params = {}, method = 'GET', body = null) {
  const url = new URL(SLACK_API, location.origin);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const opts = { method };
  if (body) { opts.headers = {'Content-Type':'application/json'}; opts.body = JSON.stringify(body); }
  const res = await fetch(url.toString(), opts);
  return res.json();
}

async function loadSlackHidden(){

    if(snap.exists()) slackHiddenChannels = new Set(snap.data().hidden||[]);
  }catch(e){}
}

async function saveSlackHidden(){
  try{
    await setDoc(doc(db,'config','slack_hidden'),{hidden:[...slackHiddenChannels]},{merge:false});

}

async function slackLoadMessages(channel) {
  const msgsEl = document.getElementById('slack-msgs');
  if (!msgsEl) { clearInterval(slackPollInterval); return; }
  try {
    const data = await slackCall('history', { channel });
    if (slackActiveChannel !== channel) return;
    if (!data.messages) return;
    const msgs = [...data.messages].reverse();
    slackCheckNewMsgs(channel, msgs);
    const wasAtBottom = msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight < 60;
    msgsEl.innerHTML = msgs.map(m => {
      const u = slackUsers[m.user] || {};
      const nome = u.real_name || u.name || m.username || 'Bot';
      const avatar = u.profile?.image_48 || '';
      const ts = new Date(parseFloat(m.ts)*1000).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      const avHtml = avatar
        ? '<img src="'+avatar+'" style="width:32px;height:32px;border-radius:4px;object-fit:cover;flex-shrink:0;"/>'
        : '<div style="width:32px;height:32px;border-radius:4px;background:#4a154b;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;">'+(nome[0]||'?').toUpperCase()+'</div>';
      const text = slackRenderText(m.text||'');
      const reactHtml = m.reactions&&m.reactions.length
        ? '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">'+
            m.reactions.map(r=>{
              const emoji = SLACK_EMOJI[r.name.replace(/-/g,'_')]||(':'+r.name+':');
              return '<span style="background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.1);border-radius:12px;padding:2px 7px;font-size:12px;cursor:default;">'+emoji+' '+r.count+'</span>';
            }).join('')+
          '</div>'
        : '';
      const threadHtml = m.reply_count
        ? '<div style="margin-top:4px;font-size:12px;color:#1264a3;cursor:pointer;" onclick="slackOpenThread(\''+channel+'\',\''+m.ts+'\',\''+nome+'\')">' +
            '💬 '+m.reply_count+' resposta'+(m.reply_count>1?'s':'')+' →'+
          '</div>'
        : '';
      return '<div style="display:flex;gap:10px;padding:6px 0;align-items:flex-start;border-bottom:0.5px solid rgba(0,0,0,0.04);">'+
        avHtml+
        '<div style="flex:1;min-width:0;">'+
          '<span style="font-weight:600;font-size:13px;">'+nome+'</span>'+
          '<span style="font-size:11px;color:var(--text-3);margin-left:6px;">'+ts+'</span>'+
          '<div style="font-size:13px;color:var(--text);margin-top:2px;line-height:1.5;word-break:break-word;">'+text+'</div>'+
          reactHtml+
          threadHtml+
        '</div>'+
      '</div>';
    }).join('');
    if (wasAtBottom) msgsEl.scrollTop = msgsEl.scrollHeight;
  } catch(e) {}
}

window.slackOpenThread = async function(channel, ts, parentNome){
  try{
    const data = await slackCall('replies', {channel, ts});
    if(!data.messages) return;
    const replies = data.messages.slice(1);
    const modal = document.createElement('div');
    modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:flex-start;justify-content:flex-end;padding:1rem;';
    let html = '<div style="background:var(--surface);border-radius:14px;width:420px;max-width:95vw;height:calc(100vh - 2rem);display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.3);">'+
      '<div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">'+
        '<span style="font-weight:600;font-size:14px;">💬 Thread</span>'+
        '<button onclick="this.closest(\'[style*=fixed]\').remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-3);">×</button>'+
      '</div>'+
      '<div style="flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;">';
    replies.forEach(m=>{
      const u = slackUsers[m.user]||{};
      const nome = u.real_name||u.name||'Bot';
      const av = u.profile?.image_48||'';
      const ts2 = new Date(parseFloat(m.ts)*1000).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      const avHtml = av
        ? '<img src="'+av+'" style="width:28px;height:28px;border-radius:4px;object-fit:cover;flex-shrink:0;"/>'
        : '<div style="width:28px;height:28px;border-radius:4px;background:#4a154b;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;">'+(nome[0]||'?').toUpperCase()+'</div>';
      html += '<div style="display:flex;gap:8px;align-items:flex-start;">'+avHtml+
        '<div><span style="font-weight:600;font-size:12px;">'+nome+'</span>'+
        '<span style="font-size:10px;color:var(--text-3);margin-left:4px;">'+ts2+'</span>'+
        '<div style="font-size:13px;margin-top:2px;line-height:1.4;">'+slackRenderText(m.text||'')+'</div></div></div>';
    });
    html += '</div></div>';
    modal.innerHTML = html;
    document.body.appendChild(modal);
  }catch(e){showToast('Erro ao carregar thread.');}
};

window.slackSend = async function() {
  const input = document.getElementById('slack-input');
  const text = input?.value?.trim();
  if (!text || !slackActiveChannel) return;
  input.value = '';
  try {
    await slackCall('send', {}, 'POST', { channel: slackActiveChannel, text });
    await slackLoadMessages(slackActiveChannel);
  } catch(e) { showToast('Erro ao enviar.'); }
};

const DISP_TIPOS = ['API','FW1','FW2','FW3','FW4','FW5','Estrategia Adicional','Estrategia Antigos'];
const DISP_CORES = {'API':'#92D050','FW1':'#00B0F0','FW2':'#FF0000','FW3':'#FF6600','FW4':'#FF6600','FW5':'#FF6600','Estrategia Adicional':'','Estrategia Antigos':''};

function getWeekDays(refDate, startDay){
  // startDay: 0=dom,1=seg,2=ter,3=qua,4=qui,5=sex,6=sab — default 1 (seg)
  if(startDay===undefined) startDay=1;
  const d = new Date(refDate);
  const day = d.getDay();
  let diff = (day - startDay + 7) % 7;
  const start = new Date(d); start.setDate(d.getDate()-diff);
  const days=[];
  for(let i=0;i<5;i++){const x=new Date(start);x.setDate(start.getDate()+i);days.push(x);}
  return days;
}

function fmtDate(d){return d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'}).replace('.','')}
function fmtDateKey(d){return d.toISOString().split('T')[0];}
function fmtDateLabel(d){const ds=['Segunda-Feira','Terca-Feira','Quarta-Feira','Quinta-Feira','Sexta-Feira','Sabado','Domingo'];return ds[d.getDay()===0?6:d.getDay()-1];}

  async function _rdGerarExcel(keys, days, data, filename){
    // Gerar CSV estruturado igual à tabela do sistema
    const header = ['Tipo de Mensagem', ...days.map(d=>d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'})), 'Soma', 'Media', 'Concentracao'];
    const rows = [header];
    const somasTipo = DISP_TIPOS.map(t=>keys.reduce((s,k)=>s+(Number(data[k]?.[t])||0),0));
    const totalGeral = somasTipo.reduce((a,b)=>a+b,0);

    DISP_TIPOS.forEach((tipo,ti)=>{
      const vals = keys.map(k=>Number(data[k]?.[tipo]||0));
      const soma = somasTipo[ti];
      const diasComDados = vals.filter(v=>v>0).length;
      const media = diasComDados>0?(soma/diasComDados).toFixed(1):0;
      const conc = totalGeral>0?((soma/totalGeral)*100).toFixed(2)+'%':'0,00%';
      rows.push([tipo,...vals,soma,media,conc]);

    const totalDia = keys.map(k=>DISP_TIPOS.reduce((s,t)=>s+(Number(data[k]?.[t])||0),0));

    a.href=url; a.download='disparos_'+filename+'.csv';

    showToast('Exportado! Abra no Excel.');

  async function loadAgenda(){
    const [semanSnap, mensalSnap, adicSnap, pessoalSnap] = await Promise.all([
      getDoc(doc(db,'config','reuniao')),
      getDoc(doc(db,'config','reuniao_mensal')),
      getDoc(doc(db,'config','reuniao_adicional')),
      getDocs(query(collection(db,'agenda_pessoal'), where('uid','==',currentUser.uid), orderBy('ts','asc')))
    ]);
    return {
      semanal:  semanSnap.exists()  ? semanSnap.data()  : {},
      mensal:   mensalSnap.exists() ? mensalSnap.data() : {},
      adicional: adicSnap.exists()  ? adicSnap.data()   : {},
      pessoal: pessoalSnap.docs.map(d=>({id:d.id,...d.data()}))
    };
  }

  // Parse dd/mm/aaaa or dd/mm → {day, month (0-based), year}
  function parseDate(str){
    if(!str) return null;
    const p = str.split('/');
    if(p.length < 2) return null;
    const d = parseInt(p[0]), m = parseInt(p[1])-1;
    const y = p.length >= 3 ? parseInt(p[2]) : new Date().getFullYear();
    if(isNaN(d)||isNaN(m)) return null;
    return {day:d, month:m, year:y};
  }

  async function renderPage(viewYear, viewMonth){
    const now = new Date();
    if(viewYear === undefined) viewYear = now.getFullYear();
    if(viewMonth === undefined) viewMonth = now.getMonth();

    const {semanal, mensal, adicional, pessoal} = await loadAgenda();

    // Build event map: key = "day-month-year" → array of events
    const evMap = {};
    const addEv = (dateStr, ev) => {
      const pd = parseDate(dateStr);
      if(!pd) return;
      const key = pd.day+'-'+pd.month+'-'+pd.year;
      if(!evMap[key]) evMap[key] = [];
      evMap[key].push(ev);
    };

    // Semanal — recorre toda semana no mês exibido (usa dia da semana do data)
    if(semanal.data){
      const pd = parseDate(semanal.data);
      if(pd){
        // find day-of-week of that date, mark every same weekday in viewMonth
        const baseDate = new Date(pd.year, pd.month, pd.day);
        const dow = baseDate.getDay();
        const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
        for(let d=1;d<=daysInMonth;d++){
          const dt = new Date(viewYear, viewMonth, d);
          if(dt.getDay()===dow){
            addEv(d+'/'+(viewMonth+1)+'/'+viewYear, {tipo:'semanal',label:'Reunião Semanal',horario:semanal.horario||'',meet:semanal.meet||''});
          }

  window.agendaSelectDay = function(d, m, y){

          '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>Remover</button>';

          '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editar</button>';
      }

        (e.horario?'<div style="font-size:11px;color:rgba(255,255,255,0.45);">'+e.horario+'</div>':'')+

  window.agendaContextMenu = function(e, d, m, y){
    e.preventDefault();
    e.stopPropagation();
    // Remove any existing context menu
    const old = document.getElementById('agenda-ctx-menu');
    if(old) old.remove();

    const key = d+'-'+m+'-'+y;
    const evs = (mc._agendaEvMap && mc._agendaEvMap[key]) || [];
    // removable: pessoal/gcal by anyone; semanal/mensal/adicional by coord only (edit, not delete)
    const removable = evs.filter(ev =>
      (ev.tipo==='pessoal' && ev.id) ||
      ev.tipo==='gcal' ||
      ((ev.tipo==='semanal'||ev.tipo==='mensal'||ev.tipo==='adicional') && isCoord)
    );
    if(removable.length === 0) return;

    const menu = document.createElement('div');
    menu.id = 'agenda-ctx-menu';
    menu.style.cssText = 'position:fixed;z-index:9999;background:#0d2e14;border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:6px;box-shadow:0 8px 32px rgba(0,0,0,0.6);min-width:180px;font-family:var(--font);';
    menu.style.left = Math.min(e.clientX, window.innerWidth-200)+'px';
    menu.style.top  = Math.min(e.clientY, window.innerHeight-120)+'px';

    // Header
    const monthNames = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.1em;padding:4px 8px 6px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:4px;';
    hdr.textContent = d+' de '+monthNames[m];
    menu.appendChild(hdr);

    removable.forEach(ev=>{
      const item = document.createElement('div');
      item.style.cssText = 'display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,0.75);font-size:12px;transition:background 0.1s;';
      item.onmouseover = ()=>{ item.style.background='rgba(239,68,68,0.15)'; item.style.color='#f87171'; };
      item.onmouseout  = ()=>{ item.style.background=''; item.style.color='rgba(255,255,255,0.75)'; };

      const dotColor = {semanal:'#22c55e',mensal:'#ef4444',pessoal:'#3b82f6',gcal:'#a855f7'}[ev.tipo]||'#fff';
      const isEditable = ev.tipo==='semanal'||ev.tipo==='mensal'||ev.tipo==='adicional';
      const isGcal = ev.tipo==='gcal';
      item.innerHTML =
        '<span style="width:6px;height:6px;border-radius:50%;background:'+dotColor+';flex-shrink:0;display:inline-block;"></span>'+
        '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(isEditable?'Editar: ':isGcal?'ℹ️ ':'')+ev.label+'</span>'+
        (isEditable
          ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;opacity:0.5;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'
          : '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;opacity:0.5;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>'
        );

      item.onclick = async ()=>{
        menu.remove();
        if(ev.tipo==='pessoal' && ev.id){
          if(!confirm('Remover "'+ev.label+'"?')) return;
          try{
            await deleteDoc(doc(db,'agenda_pessoal',ev.id));
            await renderPage(mc._agendaYear, mc._agendaMonth);
          }catch(err){showToast('Erro ao remover.');}
        } else if(ev.tipo==='gcal'){
          showToast('Acesse o Google Agenda para remover eventos do Google.');
        } else if(ev.tipo==='semanal'){
          editarReuniao();
        } else if(ev.tipo==='mensal'){
          editarReuniaoMensal();
        } else if(ev.tipo==='adicional'){
          editarReuniaoAdicional();
        }
      };
      menu.appendChild(item);
    });

    document.body.appendChild(menu);

    // Close on any click outside
    const closeMenu = (ev)=>{
      if(!menu.contains(ev.target)){ menu.remove(); document.removeEventListener('click', closeMenu); }
    };
    setTimeout(()=>document.addEventListener('click', closeMenu), 0);
  };

  window.agendaSetOpacity = function(val){
    agendaOpacity = parseFloat(val);
    localStorage.setItem('agenda_opacity', agendaOpacity);
    const lbl = document.getElementById('agenda-opacity-val');
    if(lbl) lbl.textContent = Math.round((1-agendaOpacity)*100)+'%';
    // Update all glass panels live
    const glass = 'rgba(10,30,15,'+agendaOpacity+')';
    document.querySelectorAll('[data-glass]').forEach(el => el.style.background = glass);
    renderPage(mc._agendaYear, mc._agendaMonth);
  };

  window.abrirModalReuniaoP=function(){
    const m=document.getElementById('agenda-modal');
    if(m){m.style.display='flex';document.getElementById('agp-titulo').focus();}
  };
  window.fecharModalReuniaoP=function(){
    const m=document.getElementById('agenda-modal');
    if(m) m.style.display='none';
  };
  window.salvarReuniaoP=async function(){
    const titulo=document.getElementById('agp-titulo').value.trim();
    const data=document.getElementById('agp-data').value.trim();
    const horario=document.getElementById('agp-hora').value.trim();
    const meet=document.getElementById('agp-meet').value.trim();
    if(!titulo){showToast('Digite um título.');return;}
    try{
      await addDoc(collection(db,'agenda_pessoal'),{uid:currentUser.uid,titulo,data,horario,meet,ts:Date.now()});
      showToast('Reunião salva!');
      window.fecharModalReuniaoP();
      await renderPage(mc._agendaYear, mc._agendaMonth);
    }catch(e){showToast('Erro ao salvar.');}
  };
  window.excluirReuniaoP=async function(id){
    if(!confirm('Remover esta reunião?'))return;
    try{
      await deleteDoc(doc(db,'agenda_pessoal',id));
      await renderPage(mc._agendaYear, mc._agendaMonth);
    }catch(e){showToast('Erro ao remover.');}
  };

  window.gcalConectar = function(){
    if(!window.google||!window.google.accounts){showToast('API do Google ainda carregando, tente em instantes.');return;}
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GCAL_CLIENT_ID, scope: GCAL_SCOPE,
      callback: async (resp)=>{
        if(resp.error){showToast('Erro ao conectar Google: '+resp.error);return;}
        gcalToken = resp.access_token;
        sessionStorage.setItem('gcal_token', gcalToken);
        showToast('Google Agenda conectada!');
        await gcalFetchEvents();
        await renderPage(mc._agendaYear, mc._agendaMonth);
      }
    });
    client.requestAccessToken();
  };

  window.gcalDesconectar = function(){
    gcalToken=null; gcalEvents=[];
    sessionStorage.removeItem('gcal_token'); sessionStorage.removeItem('gcal_events');
    renderPage(mc._agendaYear, mc._agendaMonth);
    showToast('Google Agenda desconectada.');
  };

  async function gcalFetchEvents(){
    if(!gcalToken) return;
    const now=new Date();
    const start=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString();
    const end=new Date(now.getFullYear(),now.getMonth()+3,0).toISOString();
    try{
      const res=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin='+encodeURIComponent(start)+'&timeMax='+encodeURIComponent(end)+'&singleEvents=true&orderBy=startTime&maxResults=250',{headers:{Authorization:'Bearer '+gcalToken}});
      if(!res.ok){if(res.status===401){gcalToken=null;sessionStorage.removeItem('gcal_token');}return;}
      const data=await res.json();
      gcalEvents=data.items||[];
      sessionStorage.setItem('gcal_events',JSON.stringify(gcalEvents));
    }catch(e){console.log('gcal error',e);}
  }

  if(gcalToken){gcalFetchEvents().then(()=>renderPage(mc._agendaYear,mc._agendaMonth));}
}

window.fecharConfig=function(){document.getElementById('basilisco-config').style.display='none';};
window.toggleBasiliscoConfig=function(){const c=document.getElementById('basilisco-config');c.style.display=c.style.display==='none'?'flex':'none';};
window.carregarPDF=async function(e){
  const file=e.target.files[0];if(!file)return;
  document.getElementById('bsk-pdf-label').textContent='Carregando PDF...';
  try{
    const arrayBuffer=await file.arrayBuffer();
    // Use PDF.js from CDN
    if(!window.pdfjsLib){
      await new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload=resolve;s.onerror=reject;document.head.appendChild(s);
      });
      window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
    const pdf=await window.pdfjsLib.getDocument({data:arrayBuffer}).promise;
    let texto='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      texto+=content.items.map(item=>item.str).join(' ')+'\n';
    }
    // Fill nome and texto fields
    const nomeEl=document.getElementById('bsk-doc-nome');
    const textoEl=document.getElementById('bsk-doc-texto');
    if(!nomeEl.value) nomeEl.value=file.name.replace('.pdf','');
    textoEl.value=texto.trim();
    document.getElementById('bsk-pdf-label').textContent='PDF carregado: '+file.name;
    showToast('PDF extraido com sucesso!');
  }catch(err){
    document.getElementById('bsk-pdf-label').textContent='Upload PDF';
    showToast('Erro ao ler PDF. Tente colar o texto.');
  }
};

window.salvarConfigBasilisco=async function(){
  const key=document.getElementById('bsk-key').value.trim();
  if(!key){showToast('Cole a chave da API.');return;}
  basiliscoKey=key;
  try{
    await setDoc(doc(db,'config','basilisco'),{key,docs:basiliscoDocs},{merge:true});
    showToast('Basilisco ativado para toda a equipe!');
    renderBasilisco(document.getElementById('mainContent'));
  }catch(e){showToast('Erro ao salvar.');}
};
window.adicionarDoc=async function(){
  const nome=document.getElementById('bsk-doc-nome').value.trim();
  const texto=document.getElementById('bsk-doc-texto').value.trim();
  if(!nome||!texto){showToast('Preencha nome e conteudo.');return;}
  basiliscoDocs.push({nome,texto});
  try{
    await setDoc(doc(db,'config','basilisco'),{key:basiliscoKey,docs:basiliscoDocs},{merge:true});
    showToast('Documento adicionado!');
    renderBasilisco(document.getElementById('mainContent'));
  }catch(e){showToast('Erro ao salvar.');}
};
window.removerDoc=async function(i){
  basiliscoDocs.splice(i,1);
  try{
    await setDoc(doc(db,'config','basilisco'),{key:basiliscoKey,docs:basiliscoDocs},{merge:true});
    renderBasilisco(document.getElementById('mainContent'));
  }catch(e){showToast('Erro ao remover.');}
};
window.perguntarBasilisco=async function(){
  const input=document.getElementById('bsk-input');
  const pergunta=input.value.trim();if(!pergunta)return;
  if(!basiliscoKey){showToast('Configure a API key primeiro.');toggleBasiliscoConfig();return;}
  const msgsEl=document.getElementById('bsk-msgs');
  const loading=document.getElementById('bsk-loading');
  const userDiv=document.createElement('div');
  userDiv.style.cssText='align-self:flex-end;max-width:75%;background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);color:#fff;padding:10px 16px;border-radius:20px 20px 4px 20px;font-size:13px;line-height:1.5;border:1px solid rgba(255,255,255,0.1);';
  userDiv.textContent=pergunta;msgsEl.appendChild(userDiv);input.value='';loading.style.display='block';msgsEl.scrollTop=msgsEl.scrollHeight;
  const contexto=basiliscoDocs.length>0?'DOCUMENTOS INTERNOS:\n\n'+basiliscoDocs.map(d=>'=== '+d.nome+' ===\n'+d.texto).join('\n\n'):'Nenhum documento carregado.';
  const systemPrompt='Voce e o Basilisco, assistente interno da equipe de Contas a Receber da Brille.\nResponda APENAS com base nos documentos internos fornecidos abaixo.\nSe a informacao nao estiver nos documentos, responda: "Nao encontrei essa informacao nos documentos internos."\nNunca invente informacoes. Nunca use conhecimento externo. Responda em portugues.\n\n'+contexto;
  try{
    // Build Gemini contents array (system instruction + history + current question)
    const geminiHistory=basiliscoMsgs.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
    const geminiBody={
      system_instruction:{parts:[{text:systemPrompt}]},
      contents:[...geminiHistory,{role:'user',parts:[{text:pergunta}]}],
      generationConfig:{maxOutputTokens:2000,temperature:0.2}
    };
    const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro:generateContent?key='+basiliscoKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(geminiBody)});
    const data=await res.json();loading.style.display='none';
    if(data.error){showToast('Erro: '+data.error.message);return;}
    const resposta=data.candidates?.[0]?.content?.parts?.[0]?.text||'Sem resposta.';
    basiliscoMsgs.push({role:'user',content:pergunta});basiliscoMsgs.push({role:'assistant',content:resposta});
    if(basiliscoMsgs.length>20)basiliscoMsgs=basiliscoMsgs.slice(-20);
    const botDiv=document.createElement('div');
    botDiv.style.cssText='align-self:flex-start;max-width:75%;background:rgba(13,46,20,0.7);backdrop-filter:blur(8px);color:#fff;padding:10px 16px;border-radius:20px 20px 20px 4px;font-size:13px;line-height:1.6;white-space:pre-wrap;border:1px solid rgba(46,139,69,0.3);';
    botDiv.textContent=resposta;msgsEl.appendChild(botDiv);
  }catch(e){loading.style.display='none';showToast('Erro de conexao.');}
  msgsEl.scrollTop=msgsEl.scrollHeight;
};
</script>
