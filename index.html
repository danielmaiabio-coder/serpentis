<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Painel Brille · Contas a Receber</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0F4F1;--surface:#FFFFFF;--border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.15);
  --text:#111A13;--text-2:#4A5E4D;--text-3:#8A9E8D;
  --primary:#1A5C2A;--primary-light:#E6F2E9;--primary-mid:#2E8B45;
  --green:#1D9E75;--green-light:#E1F5EE;
  --amber:#BA7517;--red:#A32D2D;--red-light:#FCEBEB;
  --radius:10px;--radius-lg:14px;--sidebar-w:220px;
  --font:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}
#loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:12px;}
.loader{width:32px;height:32px;border:2.5px solid var(--border-md);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-text{font-size:13px;color:var(--text-2);}
#loginScreen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:linear-gradient(135deg,#0d2e14 0%,#1A5C2A 60%,#2E8B45 100%);}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem;}
.login-logo img{width:32px;height:32px;object-fit:contain;}
.login-logo span{font-size:11px;font-weight:500;color:var(--text-2);letter-spacing:0.08em;text-transform:uppercase;}
.login-title{font-size:22px;font-weight:500;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text-2);margin-bottom:1.5rem;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text-2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.field input{width:100%;padding:9px 12px;border:1px solid var(--border-md);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;}
.field input:focus{outline:none;border-color:var(--primary-mid);}
.btn-primary{width:100%;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;}
.btn-primary:hover{background:#0d3a19;}
.btn-primary:disabled{background:var(--text-3);cursor:not-allowed;}
.login-err{font-size:12px;color:var(--red);background:var(--red-light);border-radius:var(--radius);padding:8px 12px;margin-top:10px;display:none;}
#appShell{display:none;height:100vh;flex-direction:row;}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:#0d2e14;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
.sb-brand{padding:1.25rem 1rem 1rem;border-bottom:1px solid rgba(255,255,255,0.1);}
.sb-brand-name{font-size:13px;font-weight:500;color:#fff;}
.sb-brand-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px;}
.sb-label{font-size:10px;font-weight:500;color:rgba(255,255,255,0.35);letter-spacing:0.08em;text-transform:uppercase;padding:10px 1rem 3px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 1rem;font-size:13px;color:rgba(255,255,255,0.6);cursor:pointer;border-left:2px solid transparent;transition:all 0.12s;user-select:none;}
.nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;}
.nav-item.active{color:#fff;background:rgba(46,139,69,0.35);border-left-color:#4CAF6A;font-weight:500;}
.sb-bottom{margin-top:auto;padding:1rem;border-top:1px solid rgba(255,255,255,0.1);}
.sb-user{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.sb-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;overflow:hidden;}
.sb-avatar img{width:100%;height:100%;object-fit:cover;}
.sb-user-name{font-size:12px;font-weight:500;color:#fff;}
.sb-user-role{font-size:11px;color:rgba(255,255,255,0.45);}
.btn-logout{width:100%;padding:7px;border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);background:transparent;color:rgba(255,255,255,0.6);font-family:var(--font);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-logout:hover{background:rgba(255,255,255,0.08);color:#fff;}
.main{flex:1;overflow-y:auto;padding:2rem;position:relative;}
.snake-corner{position:fixed;top:16px;right:20px;width:52px;height:52px;z-index:50;pointer-events:none;opacity:0.92;}
.snake-corner img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.25));}
.page-eyebrow{font-size:11px;font-weight:500;color:var(--primary-mid);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:4px;}
.page-title{font-size:24px;font-weight:500;color:var(--text);margin-bottom:3px;}
.page-sub{font-size:13px;color:var(--text-2);margin-bottom:1.75rem;}
.cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;border-top:3px solid transparent;}
.stat-card.blue{border-top-color:var(--primary-mid);}
.stat-card.green{border-top-color:#1D9E75;}
.stat-card.amber{border-top-color:var(--amber);}
.sc-label{font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;}
.sc-value{font-size:26px;font-weight:500;color:var(--text);line-height:1;}
.sc-sub{font-size:11px;color:var(--text-3);margin-top:6px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem;}
.panel-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:1rem;}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cmp-item{background:var(--bg);border-radius:var(--radius);padding:12px 14px;}
.cmp-label{font-size:11px;color:var(--text-3);margin-bottom:5px;}
.cmp-val{font-size:20px;font-weight:500;color:var(--text);}
.divider{height:1px;background:var(--border);margin:1rem 0;}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.diff-label{font-size:11px;color:var(--text-3);margin-bottom:5px;}
.diff-val{font-size:20px;font-weight:500;}
.pos{color:#1D9E75;}.neg{color:var(--red);}
.hist-table{width:100%;border-collapse:collapse;}
.hist-table th{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-3);padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;}
.hist-table td{font-size:13px;color:var(--text);padding:12px 10px;border-bottom:1px solid var(--border);}
.hist-table tr:last-child td{border-bottom:none;}
.pill{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;display:inline-block;}
.pill-up{background:var(--green-light);color:#085041;}
.pill-dn{background:var(--red-light);color:var(--red);}
.nota-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);}
.nota-item:last-child{border-bottom:none;}
.nota-label{font-size:13px;color:var(--text);flex:1;}
.stars{display:flex;gap:2px;}
.star{font-size:20px;cursor:pointer;color:#D5D4CE;line-height:1;}
.star.on{color:#EF9F27;}
.star.readonly{cursor:default;}
.nota-score{font-size:12px;color:var(--text-3);min-width:30px;text-align:right;font-family:var(--font-mono);}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar-week{font-size:11px;color:var(--text-3);width:72px;flex-shrink:0;font-family:var(--font-mono);}
.bar-track{flex:1;height:22px;background:var(--bg);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;}
.bar-fill span{font-size:11px;font-weight:500;color:#fff;white-space:nowrap;}
.op-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;transition:all 0.12s;}
.op-card:hover{border-color:var(--primary-mid);background:#f4faf5;}
.op-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;overflow:hidden;}
.op-av img{width:100%;height:100%;object-fit:cover;}
.op-nm{font-size:13px;font-weight:500;color:var(--text);}
.op-mt{font-size:11px;color:var(--text-3);margin-top:2px;}
.op-vl{font-size:14px;font-weight:500;color:var(--primary);margin-left:auto;}
.inp{width:100%;padding:9px 12px;border:1px solid var(--border-md);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;}
.inp:focus{outline:none;border-color:var(--primary-mid);}
.inp-label{display:block;font-size:11px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
.btn-blue{padding:9px 20px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;}
.btn-blue:hover{background:#0d3a19;}
.btn-ghost{padding:6px 12px;border:1px solid var(--border-md);border-radius:var(--radius);background:transparent;color:var(--text-2);font-family:var(--font);font-size:12px;cursor:pointer;}
.btn-ghost:hover{background:var(--bg);}
.fb-tabs{display:flex;gap:8px;margin-bottom:1.25rem;}
.fb-tab{padding:7px 16px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--text-2);}
.fb-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.fb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:10px;}
.fb-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.fb-card-title{font-size:13px;font-weight:500;color:var(--text);}
.fb-card-date{font-size:11px;color:var(--text-3);}
.fb-card-body{font-size:13px;color:var(--text-2);line-height:1.65;white-space:pre-wrap;}
.escala-section{margin-bottom:1.5rem;}
.escala-section-title{font-size:12px;font-weight:500;color:var(--primary);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;padding:8px 12px;background:var(--primary-light);border-radius:var(--radius);border-left:3px solid var(--primary);}
.escala-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.escala-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
.escala-week{font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.escala-name{font-size:14px;font-weight:500;color:var(--text);}
.escala-dates{font-size:11px;color:var(--text-3);margin-top:3px;}
.calc-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.calc-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;}
.calc-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:1.25rem;padding-bottom:10px;border-bottom:1px solid var(--border);}
.calc-result{background:var(--primary);color:#fff;border-radius:var(--radius);padding:14px 16px;margin-top:1rem;}
.calc-result-label{font-size:11px;opacity:0.8;margin-bottom:4px;}
.calc-result-val{font-size:22px;font-weight:500;}
.search-box{position:relative;margin-bottom:1rem;}
.search-box input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border-md);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;}
.search-box input:focus{outline:none;border-color:var(--primary-mid);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);}
.curso-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--radius);margin-bottom:4px;background:var(--bg);}
.curso-row.highlight{background:var(--primary-light);border:1px solid var(--primary-mid);}
.curso-nome{font-size:13px;color:var(--text);}
.curso-val{font-size:12px;font-weight:500;color:var(--primary);font-family:var(--font-mono);}
.copy-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:10px;position:relative;}
.copy-card-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px;padding-right:70px;}
.copy-card-body{font-size:13px;color:var(--text-2);line-height:1.65;white-space:pre-wrap;}
.copy-btn{position:absolute;top:10px;right:10px;padding:4px 10px;border:1px solid var(--border-md);border-radius:6px;background:transparent;color:var(--text-3);font-family:var(--font);font-size:11px;cursor:pointer;}
.copy-btn:hover{background:var(--bg);color:var(--text);}
.link-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.link-card-title{font-size:13px;font-weight:500;color:var(--text);flex:1;}
.link-card-desc{font-size:11px;color:var(--text-3);margin-top:2px;}
.link-card-btn{padding:6px 14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block;}
.link-card-btn:hover{background:#0d3a19;}
.perfil-avatar-area{display:flex;flex-direction:column;align-items:center;gap:12px;padding:2rem;background:var(--bg);border-radius:var(--radius-lg);margin-bottom:1.25rem;}
.perfil-avatar-big{width:90px;height:90px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:500;color:var(--primary);overflow:hidden;border:3px solid var(--primary-mid);}
.perfil-avatar-big img{width:100%;height:100%;object-fit:cover;}
.reuniao-banner{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#0d2e14 0%,#1A5C2A 100%);color:#fff;border-radius:var(--radius-lg);padding:18px 24px;margin-bottom:1.25rem;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(13,46,20,0.25);}
.reuniao-banner::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,0.04);border-radius:50%;}
.reuniao-banner::after{content:'';position:absolute;bottom:-40px;right:80px;width:160px;height:160px;background:rgba(255,255,255,0.03);border-radius:50%;}
.reuniao-info{display:flex;align-items:center;gap:16px;position:relative;z-index:1;}
.reuniao-icon{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.reuniao-label{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;opacity:0.55;margin-bottom:4px;}
.reuniao-datetime{font-size:16px;font-weight:500;letter-spacing:0.01em;}
.reuniao-actions{display:flex;align-items:center;gap:8px;position:relative;z-index:1;}
.reuniao-meet-btn{padding:9px 20px;background:rgba(255,255,255,0.15);backdrop-filter:blur(4px);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px;transition:all 0.15s;}
.reuniao-meet-btn:hover{background:rgba(255,255,255,0.25);border-color:rgba(255,255,255,0.4);}
.reuniao-meet-dot{width:7px;height:7px;border-radius:50%;background:#4CAF6A;box-shadow:0 0 6px #4CAF6A;animation:pulse-dot 2s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.4;}}
.reuniao-edit-btn{padding:8px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);background:transparent;color:rgba(255,255,255,0.55);font-family:var(--font);font-size:12px;cursor:pointer;transition:all 0.15s;}
.reuniao-edit-btn:hover{background:rgba(255,255,255,0.08);color:#fff;border-color:rgba(255,255,255,0.25);}
.empty{text-align:center;padding:3rem 1rem;color:var(--text-3);font-size:13px;}
.toast{position:fixed;bottom:24px;right:24px;background:#0d2e14;color:#fff;font-size:13px;padding:10px 16px;border-radius:var(--radius);opacity:0;transform:translateY(8px);transition:all 0.2s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}
/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 180px);}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;}
.chat-msg{display:flex;flex-direction:column;max-width:70%;}
.chat-msg.mine{align-self:flex-end;align-items:flex-end;}
.chat-msg.theirs{align-self:flex-start;align-items:flex-start;}
.chat-msg-name{font-size:11px;color:var(--text-3);margin-bottom:3px;}
.chat-msg-bubble{padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;}
.chat-msg.mine .chat-msg-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px;}
.chat-msg.theirs .chat-msg-bubble{background:var(--bg);color:var(--text);border-bottom-left-radius:4px;}
.chat-msg-time{font-size:10px;color:var(--text-3);margin-top:3px;}
.chat-msg-img{max-width:600px;width:100%;border-radius:10px;cursor:pointer;margin-top:4px;}
.chat-msg-file{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,0.15);border-radius:8px;text-decoration:none;color:inherit;font-size:12px;}
.chat-msg.theirs .chat-msg-file{background:var(--surface);border:1px solid var(--border);}
.chat-input-row{display:flex;gap:8px;align-items:flex-end;}
.chat-input-row textarea{flex:1;padding:10px 12px;border:1px solid var(--border-md);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;resize:none;max-height:100px;min-height:42px;}
.chat-input-row textarea:focus{outline:none;border-color:var(--primary-mid);}
.chat-attach-btn{padding:10px 12px;border:1px solid var(--border-md);border-radius:var(--radius);background:transparent;color:var(--text-2);cursor:pointer;font-size:16px;display:flex;align-items:center;}
.chat-attach-btn:hover{background:var(--bg);}
.chat-send-btn{padding:10px 18px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;}
.chat-send-btn:hover{background:#0d3a19;}
/* FEED */
.feed-grid{display:grid;grid-template-columns:1fr;gap:1.25rem;}
.feed-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.feed-card-inner{display:grid;grid-template-columns:1fr 320px;}
.feed-card-av{width:32px;height:32px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--primary);overflow:hidden;flex-shrink:0;}
.feed-card-av img{width:100%;height:100%;object-fit:cover;}
.feed-card-body{padding:1.25rem;display:flex;flex-direction:column;border-left:1px solid var(--border);min-height:420px;}
.feed-card-author{font-size:13px;font-weight:500;color:var(--text);}
.feed-card-date{font-size:11px;color:var(--text-3);}
.feed-card-caption{font-size:14px;color:var(--text);margin-bottom:1rem;line-height:1.6;}
.feed-comments{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.feed-comment{display:flex;gap:8px;}
.feed-comment-av{width:24px;height:24px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:var(--primary);flex-shrink:0;overflow:hidden;}
.feed-comment-av img{width:100%;height:100%;object-fit:cover;}
.feed-comment-body{flex:1;background:var(--bg);border-radius:10px;padding:7px 10px;}
.feed-comment-name{font-size:11px;font-weight:500;color:var(--text);margin-bottom:2px;}
.feed-comment-text{font-size:12px;color:var(--text-2);line-height:1.5;}
.feed-comment-input{display:flex;gap:8px;margin-top:auto;padding-top:10px;border-top:1px solid var(--border);}
.feed-comment-input input{flex:1;padding:8px 12px;border:1px solid var(--border-md);border-radius:20px;background:var(--bg);color:var(--text);font-family:var(--font);font-size:12px;}
.feed-comment-input input:focus{outline:none;border-color:var(--primary-mid);}
.feed-comment-input button{padding:8px 14px;background:var(--primary);color:#fff;border:none;border-radius:20px;font-family:var(--font);font-size:12px;cursor:pointer;}
.feed-card-img-wrap{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#0d2e14;}
.feed-card-img{width:100%;height:100%;object-fit:cover;display:block;}
.feed-new-post{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem;}
.postar-btn{position:relative;display:inline-flex;align-items:center;gap:8px;padding:10px 22px 10px 16px;background:linear-gradient(135deg,#0d2e14,#1A5C2A);color:#fff;border:none;border-radius:20px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;box-shadow:0 4px 14px rgba(13,46,20,0.35);transition:all 0.15s;overflow:visible;}
.postar-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(13,46,20,0.45);}
.postar-btn-tail{position:absolute;right:-18px;top:50%;transform:translateY(-50%);width:22px;height:10px;pointer-events:none;}
.upload-area{border:2px dashed var(--border-md);border-radius:var(--radius);padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.15s;margin-bottom:10px;}
.upload-area:hover{border-color:var(--primary-mid);background:var(--primary-light);}
.upload-area-text{font-size:13px;color:var(--text-3);}
.upload-preview{width:100%;max-height:200px;object-fit:contain;border-radius:var(--radius);margin-bottom:10px;display:none;background:#0d2e14;}
.forgot-link{display:block;text-align:center;font-size:12px;color:var(--text-3);margin-top:12px;cursor:pointer;text-decoration:none;}
.forgot-link:hover{color:var(--primary);}
.mute-btn{position:fixed;bottom:24px;left:24px;width:38px;height:38px;border-radius:50%;background:rgba(13,46,20,0.85);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:998;transition:all 0.15s;backdrop-filter:blur(4px);}
.mute-btn:hover{background:rgba(26,92,42,0.95);color:#fff;}
</style>
</head>
<body>
<div id="loadingScreen"><div class="loader"></div><div class="load-text">Carregando...</div></div>
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><img id="loginSnake" src=""/><span>Contas a Receber</span></div>
    <div class="login-title">Bem-vindo</div>
    <div class="login-sub">Entre com seu e-mail e senha</div>
    <div class="field"><label>E-mail</label><input type="email" id="loginEmail" placeholder="seu@email.com"/></div>
    <div class="field"><label>Senha</label><input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn-primary" id="btnLogin" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="loginErr">E-mail ou senha incorretos.</div>
    <span class="forgot-link" onclick="esqueceuSenha()">Esqueci minha senha</span>
  </div>
</div>
<div id="appShell">
  <div class="sidebar">
    <div class="sb-brand"><div class="sb-brand-name">Painel Brille</div><div class="sb-brand-sub" id="sbSub">—</div></div>
    <div id="navItems"></div>
    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-avatar" id="sbAvatar"></div>
        <div><div class="sb-user-name" id="sbName">—</div><div class="sb-user-role" id="sbRole">—</div></div>
      </div>
      <button class="btn-logout" onclick="doLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </div>
  <div class="main" id="mainContent">
    <div class="snake-corner"><img id="snakeCorner" src=""/></div>
  </div>
</div>
<button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="Som">
  <svg id="muteIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
</button>
<div class="toast" id="toast"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, addDoc, deleteDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const SNAKE_IMG = "https://res.cloudinary.com/dbd9hpwyb/image/upload/q_auto/f_auto/v1780709517/snake_jet3mt.png";
document.getElementById('loginSnake').src = SNAKE_IMG;
document.getElementById('snakeCorner').src = SNAKE_IMG;

const firebaseConfig = {
  apiKey: "AIzaSyDyCvWzsvKKgUrekqBRwUIkYbWdRTgkvS8",
  authDomain: "ninho-de-cobra.firebaseapp.com",
  projectId: "ninho-de-cobra",
  storageBucket: "ninho-de-cobra.firebasestorage.app",
  messagingSenderId: "784122936551",
  appId: "1:784122936551:web:a63e295563e0c564193642"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null,userProfile=null,viewingOp=null,activePage='resultado',fbPeriodo='mensal';
const opsCache={};

const SVG={
  resultado:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="7" height="18"/><rect x="9" y="8" width="7" height="13"/><rect x="16" y="13" width="6" height="8"/></svg>',
  historico:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  notas:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
  dashboard:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
  equipe:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  lancar:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>',
  copys:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  feedback:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
  escala:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  calc:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/></svg>',
  links:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
  perfil:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  basilisco:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 8v4l3 3"/><circle cx="18" cy="6" r="3" fill="currentColor" opacity="0.3"/><path d="M18 3v3h3"/></svg>',
  acido:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
  feed:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>',
};

onAuthStateChanged(auth, async (user) => {
  hide('loadingScreen');
  if(user){currentUser=user;await loadProfile(user.uid);}
  else showLogin();
});

async function loadProfile(uid){
  try{
    const snap=await getDoc(doc(db,'usuarios',uid));
    if(snap.exists()){userProfile=snap.data();viewingOp=userProfile.role==='op'?uid:null;setupApp();}
    else{showToast('Perfil nao encontrado.');await signOut(auth);showLogin();}
  }catch(e){showToast('Erro ao carregar perfil.');showLogin();}
}

window.doLogin=async function(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');const btn=document.getElementById('btnLogin');
  err.style.display='none';btn.disabled=true;btn.textContent='Entrando...';
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){err.style.display='block';btn.disabled=false;btn.textContent='Entrar';}
};

window.doLogout=async function(){
  await signOut(auth);currentUser=null;userProfile=null;viewingOp=null;
  hide('appShell');showLogin();
};

window.esqueceuSenha=async function(){
  const email=document.getElementById('loginEmail').value.trim();
  if(!email){showToast('Digite seu e-mail primeiro.');return;}
  try{
    await sendPasswordResetEmail(auth,email);
    showToast('E-mail de recuperacao enviado!');
  }catch(e){showToast('Erro: verifique o e-mail digitado.');}
};

// MUTE
const HISS_URL='https://res.cloudinary.com/dbd9hpwyb/video/upload/q_auto/f_auto/v1780718539/freesound_community-snake-hissing-6092_a1uuwb.mp3';
let isMuted=true;
const hissAudio=new Audio(HISS_URL);
hissAudio.volume=0.4;

window.toggleMute=function(){
  isMuted=!isMuted;
  const icon=document.getElementById('muteIcon');
  if(isMuted){
    icon.innerHTML='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
    document.getElementById('muteBtn').style.opacity='0.5';
  } else {
    icon.innerHTML='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
    document.getElementById('muteBtn').style.opacity='1';
    hissAudio.currentTime=0;hissAudio.play().catch(()=>{});
  }
};

document.addEventListener('click',function(e){
  if(!isMuted&&e.target.closest('.nav-item, .btn-blue, .chat-send-btn, .op-card, .feed-comment-input button')){
    hissAudio.currentTime=0;hissAudio.play().catch(()=>{});
  }
});

function showLogin(){hide('appShell');show('loginScreen','flex');}

function setupApp(){
  hide('loginScreen');show('appShell','flex');
  updateSidebarUser();buildNav();
  navigate(userProfile.role==='coord'?'equipe':'resultado');
}

function updateSidebarUser(){
  const ini=(userProfile.nome||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('sbName').textContent=userProfile.nome||'&#8212;';
  document.getElementById('sbRole').textContent=userProfile.role==='coord'?'Coordenador':'Operador';
  document.getElementById('sbSub').textContent=userProfile.role==='coord'?'Visao da equipe':'Meus resultados';
  const av=document.getElementById('sbAvatar');
  if(userProfile.foto){av.innerHTML='<img src="'+userProfile.foto+'" alt="foto"/>';}
  else{av.textContent=ini;av.style.background=userProfile.cor||'#1A5C2A';av.style.color='#fff';}
}

function buildNav(){
  const isCoord=userProfile.role==='coord';
  const coordNavs=[
    {id:'equipe',label:'Minha Equipe'},{id:'lancar',label:'Lancar Resultados'},
    {sep:true,label:'OPERADOR'},
    {id:'resultado',label:'Resultado'},{id:'historico',label:'Historico'},{id:'notas',label:'Notas'},{id:'dashboard',label:'Dashboard'},{id:'feedback',label:'Feedbacks'},
    {sep:true,label:'GERAL'},
    {id:'acido',label:'Acido'},{id:'feed',label:'Feed da Cobranca'},
    {id:'copys',label:'Banco de Copys'},{id:'links',label:'Links de Reneg.'},{id:'escala',label:'Escala de Roteamento'},{id:'calc',label:'Calculo de Reneg.'},
    {sep:true,label:'CONTA'},
    {id:'basilisco',label:'Basilisco'},
    {id:'perfil',label:'Meu Perfil'},
  ];
  const opNavs=[
    {id:'resultado',label:'Meu Resultado'},{id:'historico',label:'Historico'},{id:'notas',label:'Notas'},{id:'dashboard',label:'Dashboard'},{id:'feedback',label:'Feedbacks'},
    {sep:true,label:'GERAL'},
    {id:'acido',label:'Acido'},{id:'feed',label:'Feed da Cobranca'},
    {id:'copys',label:'Banco de Copys'},{id:'links',label:'Links de Reneg.'},{id:'escala',label:'Escala de Roteamento'},{id:'calc',label:'Calculo de Reneg.'},
    {sep:true,label:'CONTA'},
    {id:'basilisco',label:'Basilisco'},
    {id:'perfil',label:'Meu Perfil'},
  ];
  const navs=isCoord?coordNavs:opNavs;
  document.getElementById('navItems').innerHTML=navs.map(n=>
    n.sep?'<div class="sb-label">'+n.label+'</div>':
    '<div class="nav-item" id="nav-'+n.id+'" onclick="navigate(\''+n.id+'\')">'+( SVG[n.id]||'')+' '+n.label+'</div>'
  ).join('');
}

window.navigate=async function(page){
  activePage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('nav-'+page);if(el)el.classList.add('active');
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="snake-corner"><img src="'+SNAKE_IMG+'"/></div><div class="empty">Carregando...</div>';
  if(page==='equipe'){await renderEquipe(mc);return;}
  if(page==='lancar'){await renderLancar(mc);return;}
  if(page==='copys'){await renderCopys(mc);return;}
  if(page==='links'){await renderLinks(mc);return;}
  if(page==='escala'){await renderEscala(mc);return;}
  if(page==='calc'){renderCalc(mc);return;}
  if(page==='perfil'){await renderPerfil(mc);return;}
  if(page==='basilisco'){await renderBasilisco(mc);return;}
  if(page==='acido'){await renderAcido(mc);return;}
  if(page==='feed'){await renderFeed(mc);return;}
  if(!viewingOp&&userProfile.role==='coord'){await renderEquipe(mc);return;}
  const opSnap=await getDoc(doc(db,'usuarios',viewingOp));
  const op=opSnap.exists()?{uid:viewingOp,...opSnap.data()}:null;
  if(!op){mc.innerHTML='<div class="snake-corner"><img src="'+SNAKE_IMG+'"/></div><div class="empty">Operador nao encontrado.</div>';return;}
  if(page==='resultado')await renderResultado(mc,op);
  else if(page==='historico')await renderHistorico(mc,op);
  else if(page==='notas')await renderNotas(mc,op);
  else if(page==='dashboard')await renderDashboard(mc,op);
  else if(page==='feedback')await renderFeedback(mc,op);
};

function snakeHtml(){return '<div class="snake-corner"><img src="'+SNAKE_IMG+'"/></div>';}

window.selectOp=async function(uid){
  viewingOp=uid;document.getElementById('sbSub').textContent='Vendo: '+(opsCache[uid]||'operador');
  await navigate('resultado');
};

async function renderEquipe(mc){
  const snap=await getDocs(collection(db,'usuarios'));const ops=[];
  snap.forEach(d=>{const data=d.data();if(data.role==='op'){ops.push({uid:d.id,...data});opsCache[d.id]=data.nome;}});
  mc.innerHTML=snakeHtml()+'<div class="page-eyebrow">* Minha Equipe</div><div class="page-title">Equipe</div><div class="page-sub">Selecione um operador</div>'+
    (ops.length===0?'<div class="empty">Nenhum operador cadastrado.</div>':ops.map(op=>{
      const ini=(op.nome||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
      const avHtml=op.foto?'<img src="'+op.foto+'" alt="foto"/>':ini;
      return'<div class="op-card" onclick="selectOp(\''+op.uid+'\')"><div class="op-av" style="background:'+(op.cor||'#1A5C2A')+';color:#fff;">'+avHtml+'</div><div><div class="op-nm">'+op.nome+'</div><div class="op-mt">'+(op.email||'')+'</div></div><div class="op-vl">ver detalhes -></div></div>';
    }).join(''));
}

async function renderLancar(mc){
  const snap=await getDocs(collection(db,'usuarios'));const ops=[];
  snap.forEach(d=>{const data=d.data();if(data.role==='op')ops.push({uid:d.id,...data});});
  mc.innerHTML=snakeHtml()+'<div class="page-eyebrow">* Lancar Resultados</div><div class="page-title">Resultados semanais</div><div class="page-sub">Preencha os dados de cada operador</div>'+
    ops.map(op=>{const ini=(op.nome||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
      return'<div class="panel"><div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;"><div class="op-av" style="background:'+(op.cor||'#1A5C2A')+';color:#fff;">'+(op.foto?'<img src="'+op.foto+'" alt=""/>':ini)+'</div><div><div style="font-size:14px;font-weight:500;">'+op.nome+'</div><div style="font-size:11px;color:var(--text-3);">'+(op.email||'')+'</div></div></div>'+
      '<div style="margin-bottom:10px;"><label class="inp-label">Descricao da semana</label><input type="text" class="inp" id="desc-'+op.uid+'" placeholder="Ex: Semana 24 ? 09 a 13 de Jun"/></div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;"><div><label class="inp-label">Valor recuperado (R$)</label><input type="number" class="inp" id="valor-'+op.uid+'" placeholder="48320"/></div><div><label class="inp-label">Atendimentos</label><input type="number" class="inp" id="atend-'+op.uid+'" placeholder="87"/></div><div><label class="inp-label">Cobrancas totais</label><input type="number" class="inp" id="cobr-'+op.uid+'" placeholder="124"/></div></div>'+
      '<button class="btn-blue" onclick="salvarResultado(\''+op.uid+'\')">Salvar resultados de '+op.nome.split(' ')[0]+'</button>'+
      '<span id="saved-'+op.uid+'" style="font-size:12px;color:#1D9E75;margin-left:12px;display:none;">OK Salvo!</span></div>';
    }).join('');
}

window.salvarResultado=async function(uid){
  const desc=document.getElementById('desc-'+uid).value.trim();
  const valor=parseFloat(document.getElementById('valor-'+uid).value);
  const atend=parseInt(document.getElementById('atend-'+uid).value);
  const cobr=parseInt(document.getElementById('cobr-'+uid).value);
  if(!desc||isNaN(valor)||isNaN(atend)||isNaN(cobr)){showToast('Preencha todos os campos.');return;}
  const semSnap=await getDoc(doc(db,'semanas',uid));
  const semAnterior=semSnap.exists()?semSnap.data().atual:null;
  const valorFmt=valor.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
  try{
    await setDoc(doc(db,'semanas',uid),{descricao:desc,atual:{valor:valorFmt,atend,cobr,raw:valor},passada:semAnterior||{valor:'R$ 0',raw:0}});
    const ordemSnap=await getDocs(collection(db,'historico',uid,'semanas'));
    const ordem=ordemSnap.size+1;
    const pRaw=semAnterior?semAnterior.raw||0:0;
    const diff=valor-pRaw;const pct=pRaw?((diff/pRaw)*100).toFixed(1):'0.0';const up=diff>=0;

window.calcular=function(){
  const total=parseFloat(document.getElementById('calc-total').value)||0;
  const parcTotal=parseInt(document.getElementById('calc-parc-total').value)||0;
  const parcPagas=parseInt(document.getElementById('calc-parc-pagas').value)||0;
  if(!total||!parcTotal||parcPagas>=parcTotal){document.getElementById('calc-resultado').textContent='R$ 0,00';document.getElementById('calc-detalhe').textContent='Verifique os valores';return;}
  const valorParc=total/parcTotal;const restantes=parcTotal-parcPagas;const vista=valorParc*restantes;
  document.getElementById('calc-resultado').textContent=vista.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  document.getElementById('calc-detalhe').textContent=restantes+' parcelas restantes x R$ '+valorParc.toFixed(2).replace('.',',');
};
window.buscarCurso=function(){const val=parseFloat(document.getElementById('busca-parcela').value)||0;document.querySelectorAll('.curso-row').forEach(el=>{el.classList.toggle('highlight',val>0&&parseFloat(el.dataset.parc)===val);});};

// ACIDO CHAT
const CLOUDINARY_CLOUD = 'dbd9hpwyb';
const CLOUDINARY_PRESET = 'ml_default';

async function uploadToCloudinary(file){
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  const res = await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD+'/auto/upload', {method:'POST',body:fd});
  const data = await res.json();
  return data.secure_url;
}

          '<input type="file" id="chat-file-input" style="display:none;" onchange="chatFileSelected(event)"/>'+
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>'+

      '</div>'+

  // Load messages with realtime
  const { onSnapshot, orderBy, limit, query: fsQuery } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const q = fsQuery(collection(db,'chat_acido'), orderBy('ts','asc'), limit(100));
  if(acidoUnsub) acidoUnsub();
  acidoUnsub = onSnapshot(q, snap => {
    const msgsEl = document.getElementById('chat-msgs');
    if(!msgsEl) { if(acidoUnsub){acidoUnsub();acidoUnsub=null;} return; }
    msgsEl.innerHTML = '';
    snap.forEach(d => {

      const mine = msg.uid === currentUser.uid;
      const div = document.createElement('div');
      div.className = 'chat-msg '+(mine?'mine':'theirs');

      if(!mine) content += '<div class="chat-msg-name">'+(msg.nome||'?')+'</div>';

        content += '<img class="chat-msg-img" src="'+msg.url+'" onclick="window.open(\''+msg.url+'\',\'_blank\')" />';

      } else {
        content += '<div class="chat-msg-bubble">'+msg.texto+'</div>';
      }
      const h = new Date(msg.ts);
      const canDelete = mine || userProfile.role==='coord';
      content += '<div class="chat-msg-time">'+h.getHours().toString().padStart(2,'0')+':'+h.getMinutes().toString().padStart(2,'0')+
        (canDelete?' &nbsp;<span onclick="deletarMsgChat(\''+d.id+'\')" style="cursor:pointer;opacity:0.4;font-size:10px;" title="Excluir">&#x2715;</span>':'')+
        '</div>';
      div.innerHTML = content;
      msgsEl.appendChild(div);
    });
    msgsEl.scrollTop = msgsEl.scrollHeight;
  });
}

window.publicarPost = async function(){
  if(feedUploading) return;
  const fileInput = document.getElementById('feed-file-input');
  const legenda = document.getElementById('feed-legenda').value.trim();
  const file = fileInput.files[0];
  if(!file && !legenda){showToast('Adicione uma foto ou legenda.');return;}
  feedUploading = true;
  document.getElementById('feed-uploading').style.display='inline';
  try{
    let imagemUrl = null;
    if(file) imagemUrl = await uploadToCloudinary(file);
    const data = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
    await addDoc(collection(db,'feed_posts'),{
      autor: userProfile.nome||'?',
      autorFoto: userProfile.foto||null,
      uid: currentUser.uid,
      legenda, imagemUrl, data, ts: Date.now()
    });
    showToast('Publicado!');
    fecharModalPost();
    await renderFeed(document.getElementById('mainContent'));
  }catch(e){showToast('Erro ao publicar.');}
  feedUploading = false;
};

  const texto = input.value.trim(); if(!texto) return;
  try{
    await addDoc(collection(db,'feed_posts',postId,'comentarios'),{
      autor: userProfile.nome||'?', autorFoto: userProfile.foto||null,
      uid: currentUser.uid, texto, ts: Date.now()
    });
    input.value='';
    await renderFeed(document.getElementById('mainContent'));
  }catch(e){showToast('Erro ao comentar.');}
};

window.deletarPost=async function(postId){
  if(!confirm('Excluir esta publicacao?'))return;
  try{
    const comms=await getDocs(collection(db,'feed_posts',postId,'comentarios'));
    for(const c of comms.docs) await deleteDoc(doc(db,'feed_posts',postId,'comentarios',c.id));
    await deleteDoc(doc(db,'feed_posts',postId));
    showToast('Publicacao excluida.');
    await renderFeed(document.getElementById('mainContent'));
  }catch(e){showToast('Erro ao excluir.');}
};

window.deletarComentario=async function(postId,commId){
  try{
    await deleteDoc(doc(db,'feed_posts',postId,'comentarios',commId));
    await renderFeed(document.getElementById('mainContent'));
  }catch(e){showToast('Erro ao excluir.');}
};

// BASILISCO
let basiliscoMsgs = [];
let basiliscoKey = localStorage.getItem('basilisco_key') || '';
let basiliscoDocs = JSON.parse(localStorage.getItem('basilisco_docs') || '[]');

async function renderBasilisco(mc){
  const isCoord = userProfile.role === 'coord';
  mc.innerHTML = snakeHtml()+
    '<div class="page-eyebrow">* Basilisco</div>'+
    '<div class="page-title">Basilisco</div>'+
    '<div class="page-sub">Assistente interno treinado nos documentos da equipe</div>'+

    // Config panel (collapsed by default)
    '<div id="basilisco-config" style="'+(basiliscoKey?'display:none':'display:block')+'">'+
      '<div class="panel">'+
        '<div class="panel-title">Configuracao</div>'+
        '<div style="margin-bottom:12px;"><label class="inp-label">Chave da API OpenAI</label>'+
        '<input type="password" class="inp" id="bsk-key" value="'+basiliscoKey+'" placeholder="sk-proj-..."/>'+
        '<p style="font-size:11px;color:var(--text-3);margin-top:5px;">A chave fica salva so no seu navegador, nunca vai ao servidor.</p></div>'+
        (isCoord?
          '<div style="margin-bottom:12px;"><label class="inp-label">Documentos (cole o texto de cada doc)</label>'+
          '<div id="bsk-docs-list">'+basiliscoDocs.map((d,i)=>`
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
              <span style="font-size:12px;color:var(--text-2);flex:1;">Doc ${i+1}: ${d.nome}</span>
              <button class="btn-ghost" onclick="removerDoc(${i})">Remover</button>
            </div>`).join('')+'</div>'+
          '<div style="margin-bottom:8px;"><input type="text" class="inp" id="bsk-doc-nome" placeholder="Nome do documento" style="margin-bottom:6px;"/>'+
          '<textarea class="inp" id="bsk-doc-texto" rows="4" placeholder="Cole o conteudo do documento aqui..." style="resize:vertical;margin-top:6px;"></textarea></div>'+
          '<button class="btn-ghost" onclick="adicionarDoc()" style="margin-bottom:12px;">+ Adicionar documento</button><br/>'
        :'')+
        '<button class="btn-blue" onclick="salvarConfigBasilisco()">Salvar e ativar</button>'+
      '</div>'+
    '</div>'+

    // Chat area
    '<div id="basilisco-chat" style="'+(basiliscoKey?'display:flex':'display:none')+';flex-direction:column;height:calc(100vh - 260px);">'+
      '<div style="display:flex;justify-content:flex-end;margin-bottom:8px;">'+
        '<button class="btn-ghost" onclick="toggleBasiliscoConfig()">Configuracoes</button>'+
      '</div>'+
      '<div id="bsk-msgs" style="flex:1;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;display:flex;flex-direction:column;gap:10px;margin-bottom:10px;">'+
        '<div style="text-align:center;padding:2rem;"><div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px;">Basilisco ativo</div><div style="font-size:12px;color:var(--text-3);">'+basiliscoDocs.length+' documento(s) carregado(s). Pode perguntar!</div></div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;">'+
        '<textarea id="bsk-input" class="inp" rows="2" placeholder="Pergunte algo ao Basilisco..." style="flex:1;resize:none;" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();perguntarBasilisco();}"></textarea>'+
        '<button class="btn-blue" onclick="perguntarBasilisco()" style="align-self:flex-end;">Enviar</button>'+
      '</div>'+
    '</div>';
}

window.salvarConfigBasilisco = function(){
  const key = document.getElementById('bsk-key').value.trim();
  if(!key){showToast('Cole a chave da API.');return;}
  basiliscoKey = key;
  localStorage.setItem('basilisco_key', key);
  localStorage.setItem('basilisco_docs', JSON.stringify(basiliscoDocs));
  showToast('Basilisco configurado!');
  renderBasilisco(document.getElementById('mainContent'));
};

window.adicionarDoc = function(){
  const nome = document.getElementById('bsk-doc-nome').value.trim();
  const texto = document.getElementById('bsk-doc-texto').value.trim();
  if(!nome||!texto){showToast('Preencha nome e conteudo do documento.');return;}
  basiliscoDocs.push({nome,texto});
  localStorage.setItem('basilisco_docs',JSON.stringify(basiliscoDocs));
  showToast('Documento adicionado!');
  renderBasilisco(document.getElementById('mainContent'));
};

window.removerDoc = function(i){
  basiliscoDocs.splice(i,1);
  localStorage.setItem('basilisco_docs',JSON.stringify(basiliscoDocs));
  renderBasilisco(document.getElementById('mainContent'));
};

window.toggleBasiliscoConfig = function(){
  const cfg = document.getElementById('basilisco-config');
  const chat = document.getElementById('basilisco-chat');
  if(cfg.style.display==='none'){cfg.style.display='block';chat.style.display='none';}
  else{cfg.style.display='none';chat.style.display='flex';}
};

window.perguntarBasilisco = async function(){
  const input = document.getElementById('bsk-input');
  const pergunta = input.value.trim();
  if(!pergunta) return;
  if(!basiliscoKey){showToast('Configure a chave da API primeiro.');return;}

  // Add user message
  const msgsEl = document.getElementById('bsk-msgs');
  const userDiv = document.createElement('div');
  userDiv.style.cssText='align-self:flex-end;max-width:75%;background:var(--primary);color:#fff;padding:10px 14px;border-radius:14px 14px 4px 14px;font-size:13px;line-height:1.5;';
  userDiv.textContent = pergunta;
  msgsEl.appendChild(userDiv);
  input.value='';

  // Loading
  const loadDiv = document.createElement('div');
  loadDiv.style.cssText='align-self:flex-start;max-width:75%;background:var(--bg);padding:10px 14px;border-radius:14px 14px 14px 4px;font-size:13px;color:var(--text-3);';
  loadDiv.textContent='Basilisco esta pensando...';
  msgsEl.appendChild(loadDiv);
  msgsEl.scrollTop=msgsEl.scrollHeight;

  // Build context from docs
  const contexto = basiliscoDocs.length > 0
    ? 'DOCUMENTOS INTERNOS:\n\n'+basiliscoDocs.map((d,i)=>`=== ${d.nome} ===\n${d.texto}`).join('\n\n')
    : 'Nenhum documento interno carregado ainda.';

  const systemPrompt = `Voce e o Basilisco, assistente interno da equipe de Contas a Receber da Brille.
Responda APENAS com base nos documentos internos fornecidos abaixo.
Se a informacao nao estiver nos documentos, responda exatamente: "Nao encontrei essa informacao nos documentos internos."
Nunca invente informacoes. Nunca use conhecimento externo.
Seja direto, claro e objetivo. Responda em portugues.

${contexto}`;

  try{
    const res = await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+basiliscoKey},
      body:JSON.stringify({
        model:'gpt-4o-mini',
        messages:[
          {role:'system',content:systemPrompt},
          ...basiliscoMsgs,
          {role:'user',content:pergunta}
        ],
        max_tokens:1000,
        temperature:0.2
      })
    });
    const data = await res.json();
    if(data.error){showToast('Erro: '+data.error.message);loadDiv.remove();return;}
    const resposta = data.choices[0].message.content;
    basiliscoMsgs.push({role:'user',content:pergunta});
    basiliscoMsgs.push({role:'assistant',content:resposta});
    if(basiliscoMsgs.length>20) basiliscoMsgs=basiliscoMsgs.slice(-20);
    loadDiv.style.cssText='align-self:flex-start;max-width:75%;background:var(--bg);padding:10px 14px;border-radius:14px 14px 14px 4px;font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;';
    loadDiv.textContent=resposta;
  }catch(e){
    loadDiv.textContent='Erro ao conectar com a API. Verifique a chave.';
    showToast('Erro de conexao.');
  }
  msgsEl.scrollTop=msgsEl.scrollHeight;
};

function show(id,display='block'){document.getElementById(id).style.display=display;}
function hide(id){document.getElementById(id).style.display='none';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
