<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dbd9hpwyb/image/upload/q_auto/f_auto/v1780709517/snake_jet3mt.png"/>
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dbd9hpwyb/image/upload/q_auto/f_auto/v1780709517/snake_jet3mt.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0F4F1;--surface:#FFFFFF;--border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.15);
  --text:#111A13;--text-2:#4A5E4D;--text-3:#8A9E8D;
  --primary:#1A5C2A;--primary-light:#E6F2E9;--primary-mid:#2E8B45;
  --green:#1D9E75;--green-light:#E1F5EE;
  --amber:#BA7517;--red:#A32D2D;--red-light:#FCEBEB;
  --radius:10px;--radius-lg:14px;--sidebar-w:220px;
  --font:'Inter Tight',sans-serif;--font-mono:'DM Mono',monospace;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}
#loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:12px;}
.loader{width:32px;height:32px;border:2.5px solid var(--border-md);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes chocalho-shake{
  0%{transform:rotate(0deg);}
  15%{transform:rotate(20deg);}
  30%{transform:rotate(-20deg);}
  45%{transform:rotate(15deg);}
  60%{transform:rotate(-15deg);}
  75%{transform:rotate(8deg);}
  90%{transform:rotate(-8deg);}
  100%{transform:rotate(0deg);}
}
.chocalho-img{cursor:pointer;transform-origin:center bottom;}
.chocalho-img.shaking{animation:chocalho-shake 0.6s ease;}
.load-text{font-size:13px;color:var(--text-2);}
#loginScreen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:linear-gradient(135deg,#0d2e14 0%,#1A5C2A 60%,#2E8B45 100%);}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem;}
.login-logo img{width:32px;height:32px;object-fit:contain;}
.login-logo span{font-size:11px;font-weight:500;color:var(--text-2);letter-spacing:0.08em;text-transform:uppercase;}
.login-title{font-size:22px;font-weight:500;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text-2);margin-bottom:1.5rem;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text-2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.field input{width:100%;padding:9px 12px;border:1px solid var(--border-md);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;}
.field input:focus{outline:none;border-color:var(--primary-mid);}
.btn-primary{width:100%;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;}
.btn-primary:hover{background:#0d3a19;}
.btn-primary:disabled{background:var(--text-3);cursor:not-allowed;}
.login-err{font-size:12px;color:var(--red);background:var(--red-light);border-radius:var(--radius);padding:8px 12px;margin-top:10px;display:none;}
#appShell{display:none;height:100vh;flex-direction:row;}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:#0d2e14;display:flex;flex-direction:column;height:100vh;overflow-y:auto;font-family:'Inter Tight',sans-serif;}
.sb-brand{padding:1.25rem 1rem 1rem;border-bottom:1px solid rgba(255,255,255,0.1);}
.sb-brand-name{font-size:18px;font-weight:400;color:#fff;font-family:'UnifrakturMaguntia',serif;letter-spacing:1px;}
.sb-brand-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px;}
.sb-label{font-size:9px;font-weight:600;color:rgba(255,255,255,0.28);letter-spacing:0.14em;text-transform:uppercase;padding:18px 1rem 4px;display:flex;align-items:center;gap:8px;}.sb-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.14),transparent);min-width:12px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 1rem;font-size:12.5px;letter-spacing:0.01em;color:rgba(255,255,255,0.6);cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;user-select:none;}
.nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;}
.nav-item.active{color:#fff;background:rgba(46,139,69,0.35);border-left-color:#4CAF6A;font-weight:500;}
.nav-badge{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4CAF6A;margin-left:auto;flex-shrink:0;box-shadow:0 0 4px #4CAF6A;}
.nav-badge.red{background:#e53e3e;box-shadow:0 0 6px #e53e3e;}
@keyframes pulse-badge{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.5);opacity:0.7;}}
.nav-badge.pulse{animation:pulse-badge 1s infinite;}
.toast-big{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#0d2e14,#1A5C2A);color:#fff;padding:2rem 3rem;border-radius:18px;font-size:18px;font-weight:600;z-index:9999;box-shadow:0 20px 60px rgba(0,0,0,0.5);text-align:center;pointer-events:none;opacity:0;transition:opacity 0.3s;}
.toast-big.show{opacity:1;}

.sb-bottom{margin-top:auto;padding:1rem;border-top:1px solid rgba(255,255,255,0.1);}
.sb-user{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.sb-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;overflow:hidden;}
.sb-avatar img{width:100%;height:100%;object-fit:cover;}
.sb-user-name{font-size:12px;font-weight:500;color:#fff;}
.sb-user-role{font-size:11px;color:rgba(255,255,255,0.45);}
.btn-logout{width:100%;padding:7px;border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);background:transparent;color:rgba(255,255,255,0.6);font-family:var(--font);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-logout:hover{background:rgba(255,255,255,0.08);color:#fff;}
.main{flex:1;overflow-y:auto;padding:2rem;position:relative;}
.snake-corner{position:fixed;top:16px;right:20px;width:52px;height:52px;z-index:999;pointer-events:all;opacity:0.92;cursor:pointer;transition:transform 0.15s;}.snake-corner:hover{transform:scale(1.1);}
.snake-corner img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.25));}
.page-eyebrow{font-size:11px;font-weight:500;color:var(--primary-mid);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:4px;}
.page-title{font-size:24px;font-weight:500;color:var(--text);margin-bottom:3px;}
.page-sub{font-size:13px;color:var(--text-2);margin-bottom:1.75rem;}
.cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;border-top:3px solid transparent;}
.stat-card.blue{border-top-color:var(--primary-mid);}
.stat-card.green{border-top-color:#1D9E75;}
.stat-card.amber{border-top-color:var(--amber);}
.sc-label{font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;}
.sc-value{font-size:26px;font-weight:500;color:var(--text);line-height:1;}
.sc-sub{font-size:11px;color:var(--text-3);margin-top:6px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem;}
.panel-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:1rem;}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cmp-item{background:var(--bg);border-radius:var(--radius);padding:12px 14px;}
.cmp-label{font-size:11px;color:var(--text-3);margin-bottom:5px;}
.cmp-val{font-size:20px;font-weight:500;color:var(--text);}
.divider{height:1px;background:var(--border);margin:1rem 0;}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.diff-label{font-size:11px;color:var(--text-3);margin-bottom:5px;}
.diff-val{font-size:20px;font-weight:500;}
.pos{color:#1D9E75;}.neg{color:var(--red);}
.hist-table{width:100%;border-collapse:collapse;}
.hist-table th{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-3);padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;}
.hist-table td{font-size:13px;color:var(--text);padding:12px 10px;border-bottom:1px solid var(--border);}
.hist-table tr:last-child td{border-bottom:none;}
.pill{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;display:inline-block;}
.pill-up{background:var(--green-light);color:#085041;}
.pill-dn{background:var(--red-light);color:var(--red);}
.nota-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);}
.nota-item:last-child{border-bottom:none;}
.nota-label{font-size:13px;color:var(--text);flex:1;}
.stars{display:flex;gap:2px;}
.star{font-size:20px;cursor:pointer;color:#D5D4CE;line-height:1;}
.star.on{color:#EF9F27;}
.star.readonly{cursor:default;}
.nota-score{font-size:12px;color:var(--text-3);min-width:30px;text-align:right;font-family:var(--font-mono);}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar-week{font-size:11px;color:var(--text-3);width:72px;flex-shrink:0;font-family:var(--font-mono);}
.bar-track{flex:1;height:22px;background:var(--bg);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;}
.bar-fill span{font-size:11px;font-weight:500;color:#fff;white-space:nowrap;}
.op-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;transition:all 0.12s;}
.op-card:hover{border-color:var(--primary-mid);background:#f4faf5;}
.op-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;overflow:hidden;}
.op-av img{width:100%;height:100%;object-fit:cover;}
.op-nm{font-size:13px;font-weight:500;color:var(--text);}
.op-mt{font-size:11px;color:var(--text-3);margin-top:2px;}
.op-vl{font-size:14px;font-weight:500;color:var(--primary);margin-left:auto;}
.inp{width:100%;padding:9px 12px;border:1px solid var(--border-md);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;}
.inp:focus{outline:none;border-color:var(--primary-mid);}
.inp-label{display:block;font-size:11px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
.btn-blue{padding:9px 20px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;}
.btn-blue:hover{background:#0d3a19;}
.btn-ghost{padding:6px 12px;border:1px solid var(--border-md);border-radius:var(--radius);background:transparent;color:var(--text-2);font-family:var(--font);font-size:12px;cursor:pointer;}
.btn-ghost:hover{background:var(--bg);}
.fb-tabs{display:flex;gap:8px;margin-bottom:1.25rem;}
.fb-tab{padding:7px 16px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--text-2);}
.fb-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.fb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:10px;}
.fb-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.fb-card-title{font-size:13px;font-weight:500;color:var(--text);}
.fb-card-date{font-size:11px;color:var(--text-3);}
.fb-card-body{font-size:13px;color:var(--text-2);line-height:1.65;white-space:pre-wrap;}
.escala-section{margin-bottom:1.5rem;}
.escala-section-title{font-size:12px;font-weight:500;color:var(--primary);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;padding:8px 12px;background:var(--primary-light);border-radius:var(--radius);border-left:3px solid var(--primary);}
.escala-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.escala-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
.escala-week{font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.escala-name{font-size:14px;font-weight:500;color:var(--text);}
.escala-dates{font-size:11px;color:var(--text-3);margin-top:3px;}
.calc-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.calc-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;}
.calc-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:1.25rem;padding-bottom:10px;border-bottom:1px solid var(--border);}
.calc-result{background:var(--primary);color:#fff;border-radius:var(--radius);padding:14px 16px;margin-top:1rem;}
.calc-result-label{font-size:11px;opacity:0.8;margin-bottom:4px;}
.calc-result-val{font-size:22px;font-weight:500;}
.search-box{position:relative;margin-bottom:1rem;}
.search-box input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border-md);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;}
.search-box input:focus{outline:none;border-color:var(--primary-mid);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);}
.curso-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--radius);margin-bottom:4px;background:var(--bg);}
.curso-row.highlight{background:var(--primary-light);border:1px solid var(--primary-mid);}
.curso-nome{font-size:13px;color:var(--text);}
.curso-val{font-size:12px;font-weight:500;color:var(--primary);font-family:var(--font-mono);}
.copy-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:10px;position:relative;}
.copy-card-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px;padding-right:70px;}
.copy-card-body{font-size:13px;color:var(--text-2);line-height:1.65;white-space:pre-wrap;}
.copy-btn{position:absolute;top:10px;right:10px;padding:4px 10px;border:1px solid var(--border-md);border-radius:6px;background:transparent;color:var(--text-3);font-family:var(--font);font-size:11px;cursor:pointer;}
.copy-btn:hover{background:var(--bg);color:var(--text);}
.link-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.link-card-title{font-size:13px;font-weight:500;color:var(--text);flex:1;}
.link-card-desc{font-size:11px;color:var(--text-3);margin-top:2px;}
.link-card-btn{padding:6px 14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block;}
.link-card-btn:hover{background:#0d3a19;}
.perfil-avatar-area{position:relative;width:100%;border-radius:var(--radius-lg);margin-bottom:1.25rem;overflow:hidden;line-height:0;}
.perfil-capa{width:100%;height:510px;object-fit:cover;display:block;}
.perfil-capa-placeholder{width:100%;height:510px;background:linear-gradient(135deg,var(--primary-light),#d4edda);display:block;}
.perfil-capa-edit{position:absolute;top:12px;right:12px;padding:5px 12px;background:rgba(0,0,0,0.45);color:#fff;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,0.3);backdrop-filter:blur(4px);line-height:normal;}
.perfil-avatar-over{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;line-height:normal;}
.perfil-avatar-big{width:240px;height:240px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:500;color:var(--primary);overflow:hidden;border:4px solid #fff;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.perfil-avatar-big img{width:100%;height:100%;object-fit:cover;}
.reuniao-banner{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#0d2e14 0%,#1A5C2A 100%);color:#fff;border-radius:var(--radius-lg);padding:18px 24px;margin-bottom:1.25rem;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(13,46,20,0.25);}
.reuniao-banner::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,0.04);border-radius:50%;}
.reuniao-banner::after{content:'';position:absolute;bottom:-40px;right:80px;width:160px;height:160px;background:rgba(255,255,255,0.03);border-radius:50%;}
.reuniao-info{display:flex;align-items:center;gap:16px;position:relative;z-index:1;}
.reuniao-icon{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.reuniao-label{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;opacity:0.55;margin-bottom:4px;}
.reuniao-datetime{font-size:16px;font-weight:500;letter-spacing:0.01em;}
.reuniao-actions{display:flex;align-items:center;gap:8px;position:relative;z-index:1;}
.reuniao-meet-btn{padding:9px 20px;background:rgba(34,197,94,0.2);backdrop-filter:blur(4px);color:#4ade80;border:1px solid rgba(34,197,94,0.45);border-radius:var(--radius);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px;transition:all 0.15s;letter-spacing:0.01em;text-shadow:0 0 10px rgba(74,222,128,0.5);}
.reuniao-meet-btn:hover{background:rgba(34,197,94,0.32);border-color:rgba(34,197,94,0.7);color:#86efac;}
.reuniao-meet-dot{width:7px;height:7px;border-radius:50%;background:#4CAF6A;box-shadow:0 0 6px #4CAF6A;animation:pulse-dot 2s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.4;}}
.reuniao-edit-btn{padding:8px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);background:transparent;color:rgba(255,255,255,0.55);font-family:var(--font);font-size:12px;cursor:pointer;transition:all 0.15s;}
.reuniao-edit-btn:hover{background:rgba(255,255,255,0.08);color:#fff;border-color:rgba(255,255,255,0.25);}
.escritorio-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;transition:all 0.12s;}
.escritorio-card:hover{border-color:var(--primary-mid);background:#f4faf5;}
.escr-tab{padding:8px 18px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text-2);}
.escr-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.escr-nota{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:10px;}
.escr-nota-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.escr-nota-body{font-size:13px;color:var(--text-2);line-height:1.65;white-space:pre-wrap;}
.escr-arquivo{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:6px;}
.escr-arquivo-nome{font-size:13px;color:var(--text);flex:1;}

.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 180px);}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;}
.chat-msg{display:flex;flex-direction:column;max-width:70%;}
.chat-msg.mine{align-self:flex-end;align-items:flex-end;}

.chat-msg-name{font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:3px;}

.chat-msg.mine .chat-msg-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px;}

.chat-send-btn:hover{background:#0d3a19;}

const EMAILJS_SVC  = 'service_vqda61k';
const EMAILJS_TPL  = 'template_mcc9ohc';
const EMAILJS_KEY  = '0rL9rFjI7eki4QnBY';
let _otpCode = '';
let _otpExpiry = 0;
let _pendingUser = null;

function _2fa_deviceKey(uid){ return '2fa_trusted_'+uid; }
function _2fa_isTrusted(uid){
  try{
    const raw = localStorage.getItem(_2fa_deviceKey(uid));
    if(!raw) return false;
    const {exp} = JSON.parse(raw);
    return Date.now() < exp;
  }catch(e){return false;}
}
function _2fa_trust(uid){
  const exp = Date.now() + 30*24*60*60*1000; // 30 dias
  localStorage.setItem(_2fa_deviceKey(uid), JSON.stringify({exp}));
}

async function _2fa_sendCode(email, nome){
  _otpCode = String(Math.floor(100000 + Math.random()*900000));
  _otpExpiry = Date.now() + 10*60*1000; // 10 min
  await emailjs.send(EMAILJS_SVC, EMAILJS_TPL, {
    email: email,
    to_email: email,
    passcode: _otpCode,
    time: new Date(_otpExpiry).toLocaleTimeString('pt-BR'),
    nome: nome || email.split('@')[0],
  }, {publicKey: EMAILJS_KEY}).catch(err=>{
    console.error('EmailJS error:', JSON.stringify(err));
    throw new Error('EmailJS: '+(err.text||err.status||JSON.stringify(err)));
  });
}

window.doLogin=async function(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');const btn=document.getElementById('btnLogin');
  err.style.display='none';btn.disabled=true;btn.textContent='Entrando...';
  try{
    const cred = await signInWithEmailAndPassword(auth,email,pass);
    const uid = cred.user.uid;
    const nome = email.split('@')[0]; // usa parte do email como nome, sem precisar do Firestore

    // Verificar se dispositivo é confiável
    if(_2fa_isTrusted(uid)){
      // Pular 2FA — deixa o onAuthStateChanged cuidar do resto
      btn.disabled=false;btn.textContent='Entrar';
      return;
    }

    // Guardar usuário pendente e fazer logout temporário
    _pendingUser = {uid, email, nome};
    await signOut(auth); // sai para não entrar direto no app

    // Enviar código
    btn.textContent='Enviando código...';
    await _2fa_sendCode(email, nome);

    // Mostrar tela OTP
    document.getElementById('loginScreen').style.display='none';
    const otpScr = document.getElementById('otpScreen');
    otpScr.style.display='flex';
    document.getElementById('otpSub').textContent='Código enviado para '+email;
    document.getElementById('otpInput').value='';
    document.getElementById('otpInput').focus();
    document.getElementById('otpErr').style.display='none';
    btn.disabled=false;btn.textContent='Entrar';
  }
  catch(e){
    err.style.display='block';
    if(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'){
      err.textContent='E-mail ou senha incorretos.';
    } else {
      err.textContent='Erro: '+(e.message||e.text||JSON.stringify(e));
    }
    btn.disabled=false;btn.textContent='Entrar';
  }
};

window.doVerifyOtp=async function(){
  const input=document.getElementById('otpInput').value.trim();
  const err=document.getElementById('otpErr');
  const btn=document.getElementById('btnOtp');
  err.style.display='none';
  if(!input||input.length!==6){err.textContent='Digite os 6 dígitos.';err.style.display='block';return;}
  if(Date.now()>_otpExpiry){err.textContent='Código expirado. Reenvie.';err.style.display='block';return;}
  if(input!==_otpCode){err.textContent='Código inválido.';err.style.display='block';return;}

  // Código correto — lembrar dispositivo se marcado
  if(document.getElementById('otpLembrar').checked){
    _2fa_trust(_pendingUser.uid);
  }

  // Fazer login de verdade
  btn.disabled=true;btn.textContent='Verificando...';
  document.getElementById('otpScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  // Re-login com as credenciais salvas no form
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  await signInWithEmailAndPassword(auth,email,pass);
  btn.disabled=false;btn.textContent='Verificar';
};

window.doReenviarOtp=async function(){
  if(!_pendingUser){return;}
  try{
    document.getElementById('otpSub').textContent='Reenviando...';
    await _2fa_sendCode(_pendingUser.email,_pendingUser.nome);
    document.getElementById('otpSub').textContent='Novo código enviado para '+_pendingUser.email;
    document.getElementById('otpErr').style.display='none';
  }catch(e){
    document.getElementById('otpErr').textContent='Erro ao reenviar.';
    document.getElementById('otpErr').style.display='block';
  }
};

function renderSoundPills(){
  const padrao=document.getElementById('soundPillsPadrao');
  const descolado=document.getElementById('soundPillsDescolado');
  if(!padrao||!descolado) return;
  const makePill=(s)=>{
    const btn=document.createElement('button');
    btn.className='sound-pill'+(slackSoundPref===s.id?' active':'');
    btn.textContent=s.label;
    btn.onclick=()=>{window.slackSetSound(s.id);renderSoundPills();};
    return btn;
  };
  padrao.innerHTML='';
  descolado.innerHTML='';
  SLACK_SOUNDS.filter(s=>s.group==='padrao'||s.id==='none').forEach(s=>padrao.appendChild(makePill(s)));
  SLACK_SOUNDS.filter(s=>s.group==='descolado').forEach(s=>descolado.appendChild(makePill(s)));
}

function getPerms(){
  const isCoord = userProfile.role==='coord';
  // subroles can be a string or array
  const subs = Array.isArray(userProfile.subrole)
    ? userProfile.subrole
    : (userProfile.subrole ? [userProfile.subrole] : []);
  const hasSub = (s) => subs.includes(s);
  const canManageIA = isCoord || hasSub('iamanager');
  const canLancar = isCoord || hasSub('economic');
  const canRenegoc = isCoord || hasSub('renegoc');
  const canBanco = isCoord || hasSub('banco');
  return {isCoord, canManageIA, canLancar, canRenegoc, canBanco};
}

window.navigate=async function(page){
  activePage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('nav-'+page);if(el)el.classList.add('active');
  hideBadge(page);
  const mc=document.getElementById('mainContent');
  // Reset padding (Basilisco removes it)
  mc.style.padding='2rem';
  mc.style.overflow='auto';
  mc.style.backgroundImage='none';
  mc.style.background='';
  mc.innerHTML='<div class="empty">Carregando...</div>';
  if(page==='equipe'){await renderEquipe(mc);return;}
  if(page==='escritorio'){await renderEscritorio(mc);return;}
  if(page==='lancar'){
    const {canLancar} = getPerms();
    if(canLancar){await renderLancar(mc);return;}
    else{mc.innerHTML=snakeHtml()+'<div class="empty">Sem permissao para esta area.</div>';return;}
  }
  if(page==='copys'){await renderCopys(mc);return;}
  if(page==='links'){await renderLinks(mc);return;}
  if(page==='escala'){await renderEscala(mc);return;}
  if(page==='calc'){renderCalc(mc);return;}
  if(page==='calcquit'){renderCalcQuit(mc);return;}
  if(page==='calcreneg'){renderCalcReneg(mc);return;}
  if(page==='relatorio_disparos'){await renderRelatDisparos(mc);return;}
  if(page==='infos'){renderInfosUteis(mc);return;}
  if(page==='slack'){await renderSlack(mc);return;}
  if(page==='agenda'){await renderAgenda(mc);return;}
  if(page==='basilisco'){await renderBasilisco(mc);return;}
  if(page==='perfis'){await renderPerfis(mc);return;}
  if(page==='caderno'){await renderCaderno(mc);return;}
  if(page==='perfil'){await renderPerfil(mc);return;}

  if(page==='acido'){await renderAcido(mc);return;}
  if(page==='feed'){
    mc.style.backgroundImage='url(https://res.cloudinary.com/dbd9hpwyb/image/upload/q_auto/f_auto/v1780774424/fundo-cinza-solido_jeyxuj.jpg)';
    mc.style.backgroundSize='cover';
    mc.style.backgroundAttachment='fixed';
    await renderFeed(mc);return;
  }
  if(!viewingOp&&userProfile.role==='coord'){await renderEquipe(mc);return;}
  const opSnap=await getDoc(doc(db,'usuarios',viewingOp));
  const op=opSnap.exists()?{uid:viewingOp,...opSnap.data()}:null;
  if(!op){mc.innerHTML='<div class="empty">Operador nao encontrado.</div>';return;}
  if(page==='resultado')await renderResultado(mc,op);
  else if(page==='historico')await renderHistorico(mc,op);
  else if(page==='notas')await renderNotas(mc,op);
  else if(page==='dashboard')await renderDashboard(mc,op);

window.salvarResultado=async function(uid){
  const desc=document.getElementById('desc-'+uid).value.trim();
  const valor=parseFloat(document.getElementById('valor-'+uid).value);
  const atend=parseInt(document.getElementById('atend-'+uid).value);
  const cobr=parseInt(document.getElementById('cobr-'+uid).value);
  if(!desc||isNaN(valor)||isNaN(atend)||isNaN(cobr)){showToast('Preencha todos os campos.');return;}
  const semSnap=await getDoc(doc(db,'semanas',uid));
  const semAnterior=semSnap.exists()?semSnap.data().atual:null;
  const valorFmt=valor.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
  try{
    await setDoc(doc(db,'semanas',uid),{descricao:desc,atual:{valor:valorFmt,atend,cobr,raw:valor},passada:semAnterior||{valor:'R$ 0',raw:0}});
    const ordemSnap=await getDocs(collection(db,'historico',uid,'semanas'));
    const ordem=ordemSnap.size+1;
    const pRaw=semAnterior?semAnterior.raw||0:0;
    const diff=valor-pRaw;const pct=pRaw?((diff/pRaw)*100).toFixed(1):'0.0';const up=diff>=0;
    await setDoc(doc(db,'historico',uid,'semanas','sem-'+ordem),{semana:desc,valor:valorFmt,raw:valor,delta:(up?'+':'')+pct+'%',up,ordem});
    const s=document.getElementById('saved-'+uid);s.style.display='inline';setTimeout(()=>s.style.display='none',3000);
    showToast('Resultados salvos!');
  }catch(e){showToast('Erro ao salvar.');}
};

    '<div class="stat-card amber"><div class="sc-label">Cobrancas Totais</div><div class="sc-value">'+atual.cobr+'</div><div class="sc-sub">esta semana</div></div></div>'+

};

window.importarLinksExcel=async function(input){
  const file=input.files[0]; if(!file) return;
  const status=document.getElementById('link-xlsx-status');
  const setStatus=(msg,color)=>{if(status){status.style.display='flex';status.style.color=color||'var(--text-3)';status.textContent=msg;}};
  setStatus('📖 Lendo planilha...','var(--text-3)');
  try{
    // Read file as ArrayBuffer
    const buf=await file.arrayBuffer();
    const XLSX=window.XLSX||await import('https://cdn.sheetjs.com/xlsx-0.20.1/package/xlsx.mjs');
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

    // Find header row (row with "Oferta" or "Link" in it)
    let dataStart=1; // default: skip row 0 (header)
    for(let i=0;i<Math.min(rows.length,5);i++){
      const r=rows[i].map(c=>(c+'').toLowerCase());
      if(r.some(c=>c.includes('oferta')||c.includes('link')||c.includes('opção')||c.includes('opcao'))){
        dataStart=i+1; break;
      }
    }

    // Map columns: B=index1(oferta), C=index2(opção), D=index3(descricao/titulo), E=index4(link)
    const toAdd=[];
    for(let i=dataStart;i<rows.length;i++){
      const row=rows[i];
      const oferta=(row[1]+'').trim();   // col B
      const opcao=(row[2]+'').trim();    // col C
      const titulo=(row[3]+'').trim();   // col D
      const url=(row[4]+'').trim();      // col E
      if(!titulo&&!url) continue;        // skip empty rows
      // Map Opção to tipo
      const tipoMap={'especial':'Recorrente','recorrente':'Recorrente','padrão':'Padrao','padrao':'Padrao','standard':'Padrao'};
      const tipo=tipoMap[opcao.toLowerCase()]||'Recorrente';
      const payload={titulo:titulo||url,url,tipo,ts:Date.now()};
      if(oferta) payload.codigo=oferta;
      toAdd.push(payload);
    }

    if(toAdd.length===0){setStatus('⚠️ Nenhuma linha válida encontrada.','#f59e0b');return;}
    setStatus('⏳ Salvando '+toAdd.length+' links...','var(--text-3)');

    // Save all in parallel (batches of 20 to avoid rate limits)
    let saved=0;
    for(let i=0;i<toAdd.length;i+=20){
      const batch=toAdd.slice(i,i+20);
      await Promise.all(batch.map(p=>addDoc(collection(db,'links'),p)));
      saved+=batch.length;
      setStatus('⏳ Salvando... '+saved+'/'+toAdd.length,'var(--text-3)');
    }

    setStatus('✅ '+toAdd.length+' links importados!','var(--primary)');
    input.value='';
    setTimeout(()=>renderLinks(document.getElementById('mainContent')),800);
  }catch(e){
    console.error('xlsx import error',e);
    setStatus('❌ Erro ao ler o arquivo: '+e.message,'#ef4444');
  }
};

    if(!titulo||!url.startsWith('http')){err++;continue;}
    try{
      await addDoc(collection(db,'links'),{titulo,url,tipo,ts:Date.now()});
      ok++;
    }catch(e){err++;}
  }
  status.textContent=ok+' importados com sucesso'+(err>0?', '+err+' com erro':'')+'!';
  if(ok>0) setTimeout(()=>renderLinks(document.getElementById('mainContent')),800);
};

async function renderEscala(mc){
  const isCoord=userProfile.role==='coord';
  const snap=await getDoc(doc(db,'config','escala'));
  const escala=snap.exists()?snap.data():{};
  const watiPedro=escala.watiPedro||[{},{},{},{}];
  const watiDaniel=escala.watiDaniel||[{},{},{},{}];
  const snap2=await getDocs(collection(db,'usuarios'));
  const ops=[];
  snap2.forEach(function(d){var data=d.data();if(data.role==='op')ops.push({uid:d.id,nome:data.nome,email:data.email});});

  // Check if current user is escalado THIS week
  const hoje=new Date();
  const nome=(userProfile.nome||'').toLowerCase();
  let escaladoAgora=null;

  function isThisWeek(datesStr){
    if(!datesStr)return false;
    // Parse "15/06 a 19/06" — pega início E fim explicitamente
    const matches=[...datesStr.matchAll(/(\d{2})\/(\d{2})/g)];
    if(!matches||matches.length<1)return false;
    const ano=hoje.getFullYear();
    const [d1,m1]=[parseInt(matches[0][1]),parseInt(matches[0][2])-1];
    const inicio=new Date(ano,m1,d1);
    inicio.setHours(0,0,0,0);
    let fim;
    if(matches.length>=2){
      const [d2,m2]=[parseInt(matches[1][1]),parseInt(matches[1][2])-1];
      fim=new Date(ano,m2,d2);
    } else {
      fim=new Date(inicio);fim.setDate(fim.getDate()+6);
    }
    fim.setHours(23,59,59,999);
    const hojeClean=new Date(hoje);hojeClean.setHours(0,0,0,0);
    return hojeClean>=inicio&&hojeClean<=fim;
  }

  [...watiPedro.map((s,i)=>({...s,wati:'WATI Pedro'})),...watiDaniel.map((s,i)=>({...s,wati:'WATI Daniel'}))].forEach(s=>{
    if(s.operador&&s.operador.toLowerCase()===nome&&isThisWeek(s.dates)){
      escaladoAgora={wati:s.wati,dates:s.dates};
    }
  });

  // Load today's pontos if escalado
  let pontosHoje=[];
  if(escaladoAgora){
    const dataKey=hoje.toISOString().split('T')[0];
    try{
      const pontoSnap=await getDocs(query(collection(db,'roteamento_pontos',currentUser.uid,'pontos'),where('dataKey','==',dataKey),orderBy('ts','asc')));
      pontoSnap.forEach(d=>pontosHoje.push({id:d.id,...d.data()}));
    }catch(e){pontosHoje=[];}
  }

  // Build high-five button section
  let highFiveHtml='';
  if(escaladoAgora&&!isCoord){
    const agora=hoje;
    const diaSemana=agora.getDay(); // 0=dom, 6=sab
    const ehDiaUtil=diaSemana>=1&&diaSemana<=5;
    const totalMin=agora.getHours()*60+agora.getMinutes();
    // Slots liberados: 09h15, 10h15, ..., 17h15
    const slots=[9*60+15,10*60+15,11*60+15,12*60+15,13*60+15,14*60+15,15*60+15,16*60+15,17*60+15];
    const ultimo=pontosHoje.length?pontosHoje[pontosHoje.length-1]:null;
    // Slot atual = maior slot que já chegou
    const slotAtual=slots.filter(s=>s<=totalMin).pop();
    // Próximo slot futuro
    const proximoSlot=slots.find(s=>s>totalMin);
    // Verifica se já bateu neste slot (entre slotAtual e proximoSlot)
    const slotAtualJaBatido=slotAtual!==undefined&&pontosHoje.some(p=>{
      const [h,m]=p.hora.split(':').map(Number);
      const pMin=h*60+m;
      return pMin>=slotAtual&&(proximoSlot===undefined||pMin<proximoSlot);
    });
    const podeBater=ehDiaUtil&&slotAtual!==undefined&&!slotAtualJaBatido;

    let statusMsg='';
    if(!ehDiaUtil){
      statusMsg='Disponível apenas de segunda a sexta';
    } else if(slotAtual===undefined){
      statusMsg='Disponível a partir das 09h15';
    } else if(slotAtualJaBatido){
      if(proximoSlot){
        const h=Math.floor(proximoSlot/60),m=proximoSlot%60;
        statusMsg='Próximo High Five às '+h+'h'+(m<10?'0'+m:m);
      } else {
        statusMsg='Todos os High Fives do dia concluídos! 🎉';
      }
    }

    highFiveHtml='<div style="background:linear-gradient(135deg,#1e3a8a,#2563eb);border-radius:var(--radius-lg);padding:1.5rem 2rem;margin-bottom:1.5rem;color:#fff;">'+
      '<div style="font-size:11px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Você está escalado agora · '+escaladoAgora.wati+'</div>'+
      '<div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;">'+
      '<div>'+
      '<div style="font-size:15px;font-weight:500;margin-bottom:4px;">High Fives hoje: <b>'+pontosHoje.length+'</b></div>'+
      '<div style="font-size:12px;color:rgba(255,255,255,0.6);">'+pontosHoje.map(p=>'✓ '+p.hora).join(' · ')+'</div>'+
      '</div>'+
      (podeBater?
        '<button onclick="baterPontoRoteamento()" style="margin-left:auto;padding:16px 24px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:16px;cursor:pointer;font-size:36px;transition:all 0.15s;backdrop-filter:blur(4px);" title="Dar High Five!" onmouseover="this.style.background=\'rgba(255,255,255,0.25)\'" onmouseout="this.style.background=\'rgba(255,255,255,0.15)\'">🖐️</button>'
        :
        '<div style="margin-left:auto;padding:16px 24px;background:rgba(0,0,0,0.2);border:2px solid rgba(255,255,255,0.1);border-radius:16px;font-size:36px;opacity:0.4;" title="'+statusMsg+'">🖐️</div>'
      )+
      '</div>'+
      (statusMsg?'<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:8px;">'+statusMsg+'</div>':'')+
      '</div>';
  }

  function renderGrid(key,semanas){
    var html='';
    for(var i=0;i<4;i++){
      var sem=semanas[i]||{};
      html+='<div class="escala-item"><div class="escala-week">Semana '+(i+1)+'</div>';
      if(isCoord){
        html+='<div style="margin-bottom:8px;"><label class="inp-label" style="font-size:10px;">Datas</label>';
        html+='<input type="text" class="inp" id="'+key+'-dates-'+i+'" value="'+(sem.dates||'')+'" placeholder="02/06 a 06/06" style="font-size:12px;padding:6px 10px;"/></div>';
        html+='<div><label class="inp-label" style="font-size:10px;">Operador</label>';
        html+='<select class="inp" id="'+key+'-op-'+i+'" style="font-size:12px;padding:6px 10px;">';
        html+='<option value="">selecionar</option>';
        for(var j=0;j<ops.length;j++){
          html+='<option value="'+ops[j].nome+'"'+(sem.operador===ops[j].nome?' selected':'')+'>'+ops[j].nome+'</option>';
        }
        html+='</select></div>';
      } else {
        html+='<div class="escala-name">'+(sem.operador||'-')+'</div>';
        html+='<div class="escala-dates">'+(sem.dates||'')+'</div>';
      }
      html+='</div>';
    }
    return html;
  }

  mc.innerHTML=snakeHtml()+
    '<div style="width:100%;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,0.08);position:relative;z-index:1;"><div class="page-eyebrow">&#9679; Escala de Roteamento</div><div class="page-title">Escala do mes</div><div class="page-sub">Distribuicao dos operadores por semana</div></div>'+
    highFiveHtml+
    '<div class="escala-section"><div class="escala-section-title">WATI Pedro</div>'+
    '<div class="escala-grid">'+renderGrid('pedro',watiPedro)+'</div></div>'+
    '<div class="escala-section"><div class="escala-section-title">WATI Daniel</div>'+
    '<div class="escala-grid">'+renderGrid('daniel',watiDaniel)+'</div></div>'+
    (isCoord?'<div style="margin-top:1rem;"><button class="btn-blue" onclick="salvarEscala()">Publicar escala</button></div>':'');
}

window.calcularQuit=function(){
  const total=parseFloat(document.getElementById('quit-total').value)||0;
  const parcTotal=parseInt(document.getElementById('quit-parc-total').value)||0;
  const parcPagas=parseInt(document.getElementById('quit-parc-pagas').value)||0;
  const resEl=document.getElementById('quit-resultado');
  const detEl=document.getElementById('quit-detalhe');
  const parcsEl=document.getElementById('quit-parcelas');
  if(!total||!parcTotal||parcPagas>=parcTotal){resEl.textContent='R$ 0,00';detEl.textContent='Verifique os valores';parcsEl.innerHTML='<div style="text-align:center;color:var(--text-3);font-size:13px;padding:2rem;">Preencha os campos ao lado</div>';return;}
  const valorParc=total/parcTotal;const restantes=parcTotal-parcPagas;const vista=valorParc*restantes;
  resEl.textContent=vista.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  detEl.textContent=restantes+' parcelas restantes x R$ '+valorParc.toFixed(2).replace('.',',');
  let html='';
  for(let p=restantes;p>=1;p--){const valParc=vista/p;html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);"><div style="font-size:14px;font-weight:500;color:var(--text);">'+p+'x</div><div style="font-size:14px;color:var(--primary);font-weight:500;">R$ '+valParc.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div><div style="font-size:11px;color:var(--text-3);">Total: '+vista.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})+'</div></div>';}
  parcsEl.innerHTML=html;
};

window.calcular=function(){
  const total=parseFloat(document.getElementById('calc-total').value)||0;
  const parcTotal=parseInt(document.getElementById('calc-parc-total').value)||0;
  const parcPagas=parseInt(document.getElementById('calc-parc-pagas').value)||0;
  if(!total||!parcTotal||parcPagas>=parcTotal){document.getElementById('calc-resultado').textContent='R$ 0,00';document.getElementById('calc-detalhe').textContent='Verifique os valores';return;}

window.executarAcao=async function(acao){
  const inputId='email-'+acao;
  const msgId='msg-'+acao;
  const email=document.getElementById(inputId).value.trim();
  const msgEl=document.getElementById(msgId);
  if(!email){msgEl.style.display='block';msgEl.style.color='var(--red)';msgEl.textContent='Digite um e-mail valido.';return;}
  msgEl.style.display='block';msgEl.style.color='var(--text-3)';msgEl.textContent='Processando...';
  try{
    const url=SCRIPT_URL+'?email='+encodeURIComponent(email)+'&acao='+acao;
    const res=await fetch(url,{method:'GET',redirect:'follow'});
    const data=await res.json();
    if(data.ok){
      msgEl.style.color='var(--green)';
      msgEl.textContent='Feito! Linha '+data.linha+' atualizada com sucesso.';
      document.getElementById(inputId).value='';
    } else {
      msgEl.style.color='var(--red)';
      msgEl.textContent='Erro: '+(data.msg||'E-mail nao encontrado na planilha.');
    }
  }catch(e){
    msgEl.style.color='var(--red)';
    msgEl.textContent='Erro de conexao. Verifique o Apps Script.';
  }
};

function renderDisparosCard(id, titulo, slots, isCoord){

    ? 'https://live.wati.io/5869/teamInbox'
    : 'https://live.wati.io/354531';
  const watiLabel = id==='pedro'?'WATI Pedro':'WATI Daniel';
  const watiLink = '<a href="'+watiUrl+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:#fff;border:1px solid var(--border-md);border-radius:20px;text-decoration:none;font-size:12px;font-weight:500;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.08);">'+
    '<img src="https://res.cloudinary.com/dbd9hpwyb/image/upload/q_auto/f_auto/v1780848930/wati_hbqyix.png" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;"/>'+
    'Abrir '+watiLabel+'</a>';
  return '<div class="panel" id="card-disp-'+id+'">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">'+
      '<div class="panel-title" style="margin:0;">'+titulo+'</div>'+
      (isCoord?'<button onclick="limparDisparos(\''+id+'\')" class="btn-ghost" style="font-size:11px;">Limpar</button>':'')+
    '</div>'+
    '<div style="margin-bottom:12px;">'+watiLink+'</div>'+
    '<div id="slots-'+id+'">'+
    slots.map((s,i)=>dispSlotHtml(id,i,s,isCoord,platDefault)).join('')+
    '</div>'+
    (isCoord?
      '<div style="display:flex;gap:8px;margin-top:8px;">'+
      '<button onclick="addDispSlot(\''+id+'\')" class="btn-ghost" style="font-size:12px;">+ Adicionar</button>'+
      '<button onclick="salvarDisparos(\''+id+'\')" class="btn-blue" style="font-size:12px;padding:7px 16px;">Salvar</button>'+
      '</div>':'')+
  '</div>';
}

function dispSlotHtml(id,i,s,isCoord,platDefault){
  return '<div id="slot-'+id+'-'+i+'" style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'+
    '<input type="text" id="disp-'+id+'-hora-'+i+'" value="'+(s.hora||'')+'" placeholder="HH/MM" style="width:80px;padding:7px 10px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:var(--font);font-size:12px;background:var(--bg);" '+(isCoord?'':'readonly')+'/>'+
    '<span style="color:var(--text-3);font-size:12px;">—</span>'+
    '<input type="text" id="disp-'+id+'-data-'+i+'" value="'+(s.data||'')+'" placeholder="DD/MM" style="width:80px;padding:7px 10px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:var(--font);font-size:12px;background:var(--bg);" '+(isCoord?'':'readonly')+'/>'+
    '<input type="text" id="disp-'+id+'-plat-'+i+'" value="'+(s.plat||platDefault)+'" placeholder="Plataforma" style="flex:1;padding:7px 10px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:var(--font);font-size:12px;background:var(--bg);" '+(isCoord?'':'readonly')+'/>'+
    (isCoord&&i>0?'<button onclick="removeDispSlot(\''+id+'\','+i+')" style="padding:4px 8px;border:none;background:none;color:var(--text-3);cursor:pointer;font-size:16px;">&#x2715;</button>':'')+
  '</div>';
}

window._dispSlotCount={pedro:0,daniel:0};

window.addDispSlot=function(id){
  const container=document.getElementById('slots-'+id);
  const platDefault=id==='pedro'?'WATI PEDRO':'WATI DANIEL';
  const slots=container.querySelectorAll('[id^="slot-'+id+'-"]');
  const i=slots.length;
  window._dispSlotCount[id]=i;
  const div=document.createElement('div');
  div.innerHTML=dispSlotHtml(id,i,{},true,platDefault);
  container.appendChild(div.firstChild);
};

window.removeDispSlot=function(id,i){
  const el=document.getElementById('slot-'+id+'-'+i);
  if(el)el.remove();
};

window.salvarDisparos=async function(id){
  const container=document.getElementById('slots-'+id);
  const slots=[];
  container.querySelectorAll('[id^="slot-'+id+'-"]').forEach(row=>{
    const idx=row.id.split('-').pop();
    const hora=(document.getElementById('disp-'+id+'-hora-'+idx)||{}).value||'';
    const data=(document.getElementById('disp-'+id+'-data-'+idx)||{}).value||'';
    const plat=(document.getElementById('disp-'+id+'-plat-'+idx)||{}).value||'';
    if(hora||data) slots.push({hora,data,plat});
  });
  try{
    const snap=await getDoc(doc(db,'config','disparos'));
    const atual=snap.exists()?snap.data():{};
    atual[id]=slots;
    atual.ts=Date.now();
    await setDoc(doc(db,'config','disparos'),atual);
    showToast('Disparos salvos!');
    toastBig('Novos disparos salvos! Confira em Meu Perfil.');

const CLOUDINARY_CLOUD = 'dbd9hpwyb';
const CLOUDINARY_PRESET = 'ml_default';

async function uploadToCloudinary(file){
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  const res = await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD+'/auto/upload', {method:'POST',body:fd});
  const data = await res.json();
  return data.secure_url;
}

async function uploadRawToCloudinary(file){
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  // resource_type=raw stores file as-is without transformation — required for PDF, Excel, Word, etc.
  const res = await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD+'/raw/upload', {method:'POST',body:fd});
  const data = await res.json();
  if(!data.secure_url) throw new Error(data.error?.message||'Upload falhou');
  return data.secure_url;
}

  mc.innerHTML = snakeHtml()+

        '<button class="chat-send-btn" onclick="enviarMensagem()">Enviar</button>'+
      '</div>'+
    '</div>';

  // Load messages with realtime
  const q = query(collection(db,'chat_acido'), orderBy('ts','asc'), limit(100));
  if(acidoUnsub) acidoUnsub();
  // Cache de fotos de usuários para o chat
  const _chatFotoCache = {};
  async function _getChatFoto(uid){ 
    if(_chatFotoCache[uid]!==undefined) return _chatFotoCache[uid];
    try{ const s=await getDoc(doc(db,'usuarios',uid)); _chatFotoCache[uid]=s.exists()?(s.data().foto||''):''; }
    catch(e){ _chatFotoCache[uid]=''; }
    return _chatFotoCache[uid];
  }

  acidoUnsub = onSnapshot(q, snap => {
    const msgsEl = document.getElementById('chat-msgs');
    if(!msgsEl) { if(acidoUnsub){acidoUnsub();acidoUnsub=null;} return; }
    msgsEl.innerHTML = '';
    snap.forEach(d => {
      const msg = d.data();
      const mine = msg.uid === currentUser.uid;
      const div = document.createElement('div');
      div.className = 'chat-msg '+(mine?'mine':'theirs');
      let content = '';
      if(!mine){
        const ini=(msg.nome||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
        const fotoJaConhecida = msg.foto || _chatFotoCache[msg.uid];

        if(!fotoJaConhecida && msg.uid){
          _getChatFoto(msg.uid).then(foto=>{
            if(!foto) return;
            const el=document.getElementById(avatarId);
            if(el) el.outerHTML='<img id="'+avatarId+'" src="'+foto+'" style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;"/>';
          });
        }
        content += avatarHtml + '<div style="display:flex;flex-direction:column;align-items:flex-start;"><div class="chat-msg-name">'+(msg.nome||'?')+'</div>';
      }
      if(msg.tipo==='imagem'){
        content += '<img class="chat-msg-img" src="'+msg.url+'" onclick="window.open(\''+msg.url+'\',\'_blank\')" />';
      } else if(msg.tipo==='arquivo'){
        content += '<a class="chat-msg-bubble chat-msg-file" href="'+msg.url+'" target="_blank" download>'+
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+
          (msg.nome_arquivo||'Arquivo')+'</a>';
      } else {
        content += '<div class="chat-msg-bubble">'+msg.texto+'</div>';
      }
      const h = new Date(msg.ts);
      const canDelete = mine || userProfile.role==='coord';
      content += '<div class="chat-msg-time">'+h.getHours().toString().padStart(2,'0')+':'+h.getMinutes().toString().padStart(2,'0')+
        (canDelete?' &nbsp;<span onclick="deletarMsgChat(\''+d.id+'\')" style="cursor:pointer;opacity:0.4;font-size:10px;" title="Excluir">&#x2715;</span>':'')+
        '</div>';
      div.innerHTML = content;
      msgsEl.appendChild(div);
    });
    msgsEl.scrollTop = msgsEl.scrollHeight;
  });
}

async function renderEscritorio(mc){
  const {isCoord}=getPerms();
  if(!isCoord){mc.innerHTML=snakeHtml()+'<div class="empty">Acesso restrito ao coordenador.</div>';return;}
  const snap=await getDocs(collection(db,'usuarios'));
  const ops=[];
  snap.forEach(d=>{const data=d.data();if(data.role==='op')ops.push({uid:d.id,...data});});
  mc.innerHTML=snakeHtml()+
    '<div style="width:100%;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,0.08);position:relative;z-index:1;">'+

    '<div class="page-title">Escritorio</div>'+
    '<div class="page-sub">Registros e anotacoes por operador — visivel apenas para coordenadores</div>'+
    '</div>'+
    ops.map(op=>{
      const ini=(op.nome||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
      const avHtml=op.foto?'<img src="'+op.foto+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>':ini;
      return'<div class="escritorio-card" onclick="abrirEscritorio(\''+op.uid+'\')">'+
        '<div class="op-av" style="background:'+(op.cor||'#1A5C2A')+';color:#fff;">'+avHtml+'</div>'+
        '<div><div class="op-nm">'+op.nome+'</div><div class="op-mt">'+(op.email||'')+'</div></div>'+

    }).join('');

async function carregarEscrConteudo(op){
  const cont=document.getElementById('escr-content');
  if(!cont)return;
  const snap=await getDocs(collection(db,'escritorio',op.uid,escritorioTab));
  const notas=[];snap.forEach(d=>notas.push({id:d.id,...d.data()}));
  notas.sort((a,b)=>(b.ts||0)-(a.ts||0));

  cont.innerHTML=
    '<div class="panel" style="margin-bottom:1rem;">'+
    '<div class="panel-title">Nova nota — '+(escritorioTab==='registros'?'Registro':'Semanal')+'</div>'+
    '<div style="margin-bottom:10px;"><label class="inp-label">Titulo</label><input type="text" class="inp" id="escr-titulo" placeholder="Ex: Aviso verbal - 06/06/2026"/></div>'+
    '<div style="margin-bottom:10px;"><label class="inp-label">Conteudo</label><textarea class="inp" id="escr-texto" rows="5" style="resize:vertical;" placeholder="Escreva aqui..."></textarea></div>'+
    '<div style="margin-bottom:12px;"><label class="inp-label">Arquivo (opcional)</label>'+
    '<label style="display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border-md);border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--text-2);">'+
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+
    '<span id="escr-file-label">Selecionar arquivo</span>'+
    '<input type="file" id="escr-file" style="display:none;" onchange="escr_previewFile(event)"/></label></div>'+
    '<button class="btn-blue" onclick="salvarEscrNota(\''+op.uid+'\')">Salvar nota</button>'+
    '</div>'+
    (notas.length===0?'<div class="panel"><div class="empty">Nenhuma nota ainda.</div></div>':
    notas.map(n=>'<div class="escr-nota">'+
      '<div class="escr-nota-title"><span>'+n.titulo+'</span>'+
      '<div style="display:flex;align-items:center;gap:8px;">'+
      '<span style="font-size:11px;color:var(--text-3);">'+( n.data||'')+'</span>'+
      '<button class="btn-ghost" onclick="deletarEscrNota(\''+op.uid+'\',\''+n.id+'\')">Excluir</button>'+
      '</div></div>'+
      '<div class="escr-nota-body">'+n.texto+'</div>'+
      (n.arquivoUrl?'<a href="'+n.arquivoUrl+'" target="_blank" class="escr-arquivo" style="margin-top:10px;text-decoration:none;">'+
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+
        '<span class="escr-arquivo-nome">'+(n.arquivoNome||'Arquivo')+'</span>'+
        '<span style="font-size:11px;color:var(--primary);">Abrir</span></a>':'')+'</div>').join(''));
}

window.salvarEscrNota=async function(opUid){
  const titulo=document.getElementById('escr-titulo').value.trim();
  const texto=document.getElementById('escr-texto').value.trim();
  const file=document.getElementById('escr-file').files[0];
  if(!titulo){showToast('Digite um titulo.');return;}
  let arquivoUrl=null,arquivoNome=null;
  if(file){
    showToast('Enviando arquivo...');
    try{
      arquivoUrl=await uploadToCloudinary(file);
      arquivoNome=file.name;
    }catch(e){showToast('Erro ao enviar arquivo.');}
  }
  const data=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  try{
    await addDoc(collection(db,'escritorio',opUid,escritorioTab),{titulo,texto,arquivoUrl,arquivoNome,data,ts:Date.now()});
    showToast('Nota salva!');
    document.getElementById('escr-titulo').value='';
    document.getElementById('escr-texto').value='';
    document.getElementById('escr-file').value='';
    document.getElementById('escr-file-label').textContent='Selecionar arquivo';
    const opSnap=await getDoc(doc(db,'usuarios',opUid));
    const op=opSnap.exists()?{uid:opUid,...opSnap.data()}:{uid:opUid,nome:'Operador'};
    await carregarEscrConteudo(op);
  }catch(e){showToast('Erro ao salvar.');}
};

  try{
    await deleteDoc(doc(db,'escritorio',opUid,escritorioTab,nId));
    showToast('Nota excluida.');
    const opSnap=await getDoc(doc(db,'usuarios',opUid));
    const op=opSnap.exists()?{uid:opUid,...opSnap.data()}:{uid:opUid,nome:'Operador'};

};

window.salvarPerfil=async function(){
  const nome=document.getElementById('perfil-nome').value.trim();
  const fotoEl=document.getElementById('perfil-foto-preview');
  const capaEl=document.getElementById('perfil-capa-preview');
  const fotoSrc=fotoEl?fotoEl.src:'';
  const capaSrc=capaEl?capaEl.src:'';
  const foto=(fotoSrc&&fotoSrc.length>10&&fotoSrc!==window.location.href&&!fotoSrc.endsWith('/'))?fotoSrc:null;
  const capa=(capaSrc&&capaSrc.length>10&&capaSrc!==window.location.href&&!capaSrc.endsWith('/'))?capaSrc:null;
  const bgColor=window._bgSelecionado!==undefined?window._bgSelecionado:(userProfile.bgColor||'');
  if(!nome){showToast('Digite seu nome.');return;}
  try{
    const updates={nome,bgColor};
    if(foto&&foto!==userProfile.foto) updates.foto=foto;
    if(capa&&capa!==userProfile.capa) updates.capa=capa;
    await setDoc(doc(db,'usuarios',currentUser.uid),updates,{merge:true});
    userProfile.nome=nome;
    userProfile.bgColor=bgColor;
    if(updates.foto) userProfile.foto=updates.foto;
    if(updates.capa) userProfile.capa=updates.capa;
    aplicarBg(bgColor);
    updateSidebarUser();
    showToast('Perfil atualizado!');
  }catch(e){showToast('Erro: '+e.message);}
};

  const opSnap=await getDoc(doc(db,'usuarios',uid));
  const op=opSnap.exists()?{uid,...opSnap.data()}:{uid,nome:'Operador'};
  await renderEscritorioOp(document.getElementById('mainContent'),op);
};


window.setEscrTab=async function(tab){
  escritorioTab=tab;
  document.querySelectorAll('.escr-tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.escr-tab').forEach(el=>{if(el.textContent.toLowerCase().includes(tab.substring(0,4)))el.classList.add('active');});
  const opSnap=await getDoc(doc(db,'usuarios',escritorioOpAtual));
  const op=opSnap.exists()?{uid:escritorioOpAtual,...opSnap.data()}:{uid:escritorioOpAtual,nome:'Operador'};
  await carregarEscrConteudo(op);
};


window.escr_previewFile=function(e){
  const file=e.target.files[0];
  document.getElementById('escr-file-label').textContent=file?file.name:'Selecionar arquivo';
};

window.salvarEscrNota=async function(opUid){
  const titulo=document.getElementById('escr-titulo').value.trim();
  const texto=document.getElementById('escr-texto').value.trim();
  const file=document.getElementById('escr-file').files[0];
  if(!titulo){showToast('Digite um titulo.');return;}
  let arquivoUrl=null,arquivoNome=null;
  if(file){
    showToast('Enviando arquivo...');
    try{
      arquivoUrl=await uploadToCloudinary(file);
      arquivoNome=file.name;
    }catch(e){showToast('Erro ao enviar arquivo.');}
  }
  const data=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  try{
    await addDoc(collection(db,'escritorio',opUid,escritorioTab),{titulo,texto,arquivoUrl,arquivoNome,data,ts:Date.now()});
    showToast('Nota salva!');
    document.getElementById('escr-titulo').value='';
    document.getElementById('escr-texto').value='';
    document.getElementById('escr-file').value='';
    document.getElementById('escr-file-label').textContent='Selecionar arquivo';
    const opSnap=await getDoc(doc(db,'usuarios',opUid));
    const op=opSnap.exists()?{uid:opUid,...opSnap.data()}:{uid:opUid,nome:'Operador'};
    await carregarEscrConteudo(op);
  }catch(e){showToast('Erro ao salvar.');}
};

window.deletarEscrNota=async function(opUid,nId){
  if(!confirm('Excluir esta nota?'))return;
  try{
    await deleteDoc(doc(db,'escritorio',opUid,escritorioTab,nId));
    showToast('Nota excluida.');
    const opSnap=await getDoc(doc(db,'usuarios',opUid));
    const op=opSnap.exists()?{uid:opUid,...opSnap.data()}:{uid:opUid,nome:'Operador'};
    await carregarEscrConteudo(op);
  }catch(e){showToast('Erro ao excluir.');}
};

// NOTIFICATION SYSTEM
const BADGES = ['resultado','feedback','acido','feed','escala','perfil'];
let lastSeen = JSON.parse(localStorage.getItem('lastSeen')||'{}');
let unsubBadges = [];

function showBadge(id, pulse=false){
  const el=document.getElementById('badge-'+id);
  if(el){el.style.display='inline-block';if(pulse){el.classList.add('red','pulse');}else{el.classList.remove('red','pulse');}}
}
function hideBadge(id){
  const el=document.getElementById('badge-'+id);
  if(el)el.style.display='none';
  lastSeen[id]=Date.now();
  localStorage.setItem('lastSeen',JSON.stringify(lastSeen));
}

async function setupBadges(){
  // Chat da Uol - listen for new messages
  const chatQ=query(collection(db,'chat_acido'),orderBy('ts','desc'),limit(1));
  const u1=onSnapshot(chatQ,snap=>{
    if(!snap.empty){
      const msg=snap.docs[0].data();
      if(msg.uid!==currentUser.uid&&msg.ts>(lastSeen.acido||0)){showBadge('acido');}
    }
  });
  unsubBadges.push(u1);

  // Feed - listen for new posts
  const feedQ=query(collection(db,'feed_posts'),orderBy('ts','desc'),limit(1));
  const u2=onSnapshot(feedQ,snap=>{
    if(!snap.empty){
      const post=snap.docs[0].data();
      if(post.uid!==currentUser.uid&&post.ts>(lastSeen.feed||0)){showBadge('feed');}
    }
  });
  unsubBadges.push(u2);

  // Feedbacks - new feedback for this user
  if(userProfile.role!=='coord'){
    const fbQ=query(collection(db,'feedbacks',currentUser.uid,'registros'),orderBy('ts','desc'),limit(1));
    const u3=onSnapshot(fbQ,snap=>{
      if(!snap.empty){
        const fb=snap.docs[0].data();
        if(fb.ts>(lastSeen.feedback||0)){showBadge('feedback');}
      }
    });
    unsubBadges.push(u3);
  }

  // Resultado - new semana
  const semQ=query(collection(db,'semanas'),orderBy('ts','desc'),limit(1));
  const u4=onSnapshot(semQ,snap=>{
    if(!snap.empty){
      const s=snap.docs[0].data();
      if(s.ts>(lastSeen.resultado||0)){showBadge('resultado');}
    }
  });
  unsubBadges.push(u4);

  // Escala - config changes
  const u5=onSnapshot(doc(db,'config','escala'),snap=>{
    if(snap.exists()){
      const ts=snap.data().ts||0;
      if(ts>(lastSeen.escala||0)){showBadge('escala');}
    }
  });
  unsubBadges.push(u5);


  // Disparos (perfil) - coordenador salva disparos → badge pulsante vermelho para todos
  const u6=onSnapshot(doc(db,'config','disparos'),snap=>{
    if(snap.exists()){
      const ts=snap.data().ts||0;
      if(ts>(lastSeen.perfil||0)){showBadge('perfil',true);}
    }
  });
  unsubBadges.push(u6);

  // ── NOTIFICAÇÕES PROATIVAS ────────────────────────────────────────────────

  // 1) Escala atualizada → notifica todos (exceto coord)
  if(userProfile.role!=='coord'){
    const escalaNotifKey = 'notif_escala_ts';
    onSnapshot(doc(db,'config','escala'),snap=>{
      if(!snap.exists()) return;
      const ts = snap.data().ts||0;
      const lastNotif = parseInt(localStorage.getItem(escalaNotifKey)||'0');
      if(ts > lastNotif && ts > Date.now()-86400000){ // só se mudou nas últimas 24h
        localStorage.setItem(escalaNotifKey, ts);
        notificarBrowser('📋 Escala atualizada', 'O coordenador publicou uma nova escala de roteamento. Confira!');
      }
    });
  }

  // 2) High Five — avisa 1 min antes de cada slot (09:15, 10:15 ... 17:15)
  // Só para quem está escalado nesta semana
  (async()=>{
    const escSnap = await getDoc(doc(db,'config','escala'));
    if(!escSnap.exists()||userProfile.role==='coord') return;
    const escData = escSnap.data();
    const nome = (userProfile.nome||'').toLowerCase();
    function isThisWeekHF(datesStr){
      if(!datesStr) return false;
      const matches=[...datesStr.matchAll(/(\d{2})\/(\d{2})/g)];
      if(!matches||matches.length<1) return false;
      const hoje=new Date(); hoje.setHours(0,0,0,0);
      const ano=hoje.getFullYear();
      const [d1,m1]=[parseInt(matches[0][1]),parseInt(matches[0][2])-1];
      const inicio=new Date(ano,m1,d1); inicio.setHours(0,0,0,0);
      let fim;
      if(matches.length>=2){const [d2,m2]=[parseInt(matches[1][1]),parseInt(matches[1][2])-1];fim=new Date(ano,m2,d2);}
      else{fim=new Date(inicio);fim.setDate(fim.getDate()+6);}
      fim.setHours(23,59,59,999);
      return hoje>=inicio&&hoje<=fim;
    }
    let escalado = false;
    ['watiPedro','watiDaniel'].forEach(wati=>{
      (escData[wati]||[]).forEach(sem=>{
        if(sem.operador&&sem.operador.toLowerCase()===nome&&isThisWeekHF(sem.dates)) escalado=true;
      });
    });
    if(!escalado) return;

    const HF_SLOTS = [9*60+15,10*60+15,11*60+15,12*60+15,13*60+15,14*60+15,15*60+15,16*60+15,17*60+15];
    const HF_NOTIF_KEY = 'notif_hf_fired_'; // + date + slot

    function scheduleHFNotifs(){
      const now = new Date();
      const dow = now.getDay();
      if(dow===0||dow===6) return; // só dias úteis
      const todayStr = now.toISOString().slice(0,10);
      const nowMin = now.getHours()*60+now.getMinutes();

      HF_SLOTS.forEach(slot=>{
        const key = HF_NOTIF_KEY+todayStr+'-'+slot;
        if(localStorage.getItem(key)) return; // já disparou hoje neste slot
        const msUntil = (slot-1)*60*1000 - (nowMin*60+now.getSeconds())*1000; // 1 min antes
        if(msUntil > 0 && msUntil < 4*60*60*1000){ // só agenda se for nas próximas 4h
          setTimeout(()=>{
            localStorage.setItem(key,'1');
            notificarBrowser('🖐️ Hora do High Five!', 'Seu High Five está disponível em 1 minuto (às '+(Math.floor(slot/60))+'h'+(slot%60<10?'0'+slot%60:slot%60)+').');
          }, msUntil);
        }
      });
    }
    scheduleHFNotifs();
    // Re-agenda a cada hora para pegar novos slots
    setInterval(scheduleHFNotifs, 60*60*1000);
  })();

  // 3) Reunião próxima — 30 min e 5 min antes
  (async()=>{
    const MEETING_NOTIF_KEY = 'notif_meeting_fired_';
    async function scheduleMeetingNotifs(){
      const [semSnap, menSnap] = await Promise.all([
        getDoc(doc(db,'config','reuniao')),
        getDoc(doc(db,'config','reuniao_mensal'))
      ]);
      const meetings = [];
      if(semSnap.exists()&&semSnap.data().horario) meetings.push({label:'Reunião Semanal', ...semSnap.data()});
      if(menSnap.exists()&&menSnap.data().horario) meetings.push({label:'Reunião Mensal', ...menSnap.data()});

      meetings.forEach(meet=>{
        if(!meet.horario) return;
        const [hh,mm] = meet.horario.split(':').map(Number);
        if(isNaN(hh)||isNaN(mm)) return;

        // Resolve the date: use meet.data if set, otherwise today
        let meetDate = new Date();
        if(meet.data){
          const p = meet.data.split('/');
          if(p.length>=2){
            meetDate = new Date(
              p.length>=3?parseInt(p[2]):new Date().getFullYear(),
              parseInt(p[1])-1, parseInt(p[0]), hh, mm, 0
            );
          }
        } else {
          meetDate = new Date();
          meetDate.setHours(hh,mm,0,0);
        }

        const now = Date.now();
        const meetTs = meetDate.getTime();
        const todayStr = meetDate.toISOString().slice(0,10);

        [30,5].forEach(minBefore=>{
          const fireAt = meetTs - minBefore*60*1000;
          const key = MEETING_NOTIF_KEY+meet.label+'-'+todayStr+'-'+minBefore;
          if(localStorage.getItem(key)) return;
          const delay = fireAt - now;
          if(delay > 0 && delay < 25*60*60*1000){
            setTimeout(()=>{
              localStorage.setItem(key,'1');
              notificarBrowser(
                '📅 '+meet.label+' em '+minBefore+' minutos',
                'Começa às '+meet.horario+(meet.data?' · '+meet.data:'')+(meet.meet?' — Acesse o link no Serpentis':'')+'.'
              );
            }, delay);
          }
        });
      });
    }
    await scheduleMeetingNotifs();
    // Re-verifica a cada 10 min (caso o coord edite o horário)
    setInterval(scheduleMeetingNotifs, 10*60*1000);
  })();
}

function notificarBrowser(titulo, corpo){
  if(!('Notification' in window)) return;
  if(Notification.permission==='granted'){
    new Notification(titulo,{body:corpo,icon:'https://res.cloudinary.com/dbd9hpwyb/image/upload/q_auto/f_auto/v1780780614/chocalho_1_in7jon.png'});
  } else if(Notification.permission!=='denied'){
    Notification.requestPermission().then(p=>{
      if(p==='granted') new Notification(titulo,{body:corpo});
    });
  }
}

function toastBig(msg){
  let el=document.getElementById('toast-big');
  if(!el){el=document.createElement('div');el.id='toast-big';el.className='toast-big';document.body.appendChild(el);}
  el.innerHTML='🚨 '+msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),4000);
}

function show(id,display='block'){document.getElementById(id).style.display=display;}
function hide(id){document.getElementById(id).style.display='none';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

async function renderCaderno(mc){
  // Load all notes
  let notas=[];
  try{
    const snap=await getDocs(query(collection(db,'caderno',currentUser.uid,'notas'),orderBy('ts','desc')));

        '<div style="font-size:12px;color:#888;margin-top:2px;">Só você tem acesso a essas anotações</div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;">'+
        '<button onclick="novoTopico()" style="display:flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(139,69,19,0.1);border:1px solid #c8a96e;border-radius:8px;font-family:var(--font);font-size:12px;color:#8B4513;cursor:pointer;">'+
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Novo Tópico</button>'+

      ? '<div style="text-align:center;padding:3rem;color:#aaa;font-style:italic;font-size:15px;background:rgba(255,255,255,0.7);border-radius:12px;">Sua primeira página está em branco...<br>Comece criando um tópico!</div>'

      '<select id="caderno-topico" style="padding:6px 10px;border:1px solid #e8dfc8;border-radius:8px;font-family:var(--font);font-size:12px;background:#fff;color:#555;">'+
        topicoList.map(t=>'<option value="'+t+'">'+t+'</option>').join('')+
        '<option value="Geral">Geral</option>'+
      '</select>'+
    '</div>'+
    '<div style="padding:1.5rem;background:#fffef5;">'+
    '<textarea id="caderno-texto" rows="12" placeholder="Escreva aqui..." style="width:100%;border:none;outline:none;background:#fffef5;color:#2d2d2d;font-family:var(--font);resize:none;line-height:1.8;font-size:15px;"></textarea>'+
    '</div>'+
    '<div style="padding:1rem 1.5rem;border-top:1px solid #ede8da;display:flex;align-items:center;justify-content:flex-end;gap:8px;">'+
    '<button onclick="fecharCaderno()" style="padding:8px 18px;border:1px solid #ddd;border-radius:8px;background:transparent;font-family:var(--font);font-size:13px;cursor:pointer;color:#666;">Cancelar</button>'+
    '<button onclick="salvarNota()" style="padding:8px 18px;background:#8B4513;color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:13px;cursor:pointer;font-weight:500;">Salvar</button>'+
    '</div></div></div>';
  }

  let _openTopico = topicoList[0]||null;
  mc.innerHTML = buildHtml(_openTopico);

  window.cadernoToggleTopico = function(tEnc){
    const t = decodeURIComponent(tEnc);
    _openTopico = _openTopico===t ? null : t;
    mc.innerHTML = buildHtml(_openTopico);
  };

  window.novoTopico = function(){
    const nome = prompt('Nome do novo tópico:');
    if(!nome||!nome.trim()) return;
    // Create a placeholder note so topic persists
    const t = nome.trim();
    if(topicos[t]){ showToast('Tópico já existe.'); return; }
    topicos[t] = [];
    topicoList.unshift(t);
    _openTopico = t;
    mc.innerHTML = buildHtml(_openTopico);
  };

  window._cadernoEditId = null;
  window._cadernoTopicoAtual = null;

  window.novaNota = function(topicoEnc){
    window._cadernoEditId = null;
    const t = topicoEnc ? decodeURIComponent(topicoEnc) : (_openTopico||'Geral');
    window._cadernoTopicoAtual = t;
    document.getElementById('caderno-titulo').value = '';
    document.getElementById('caderno-texto').value = '';
    const sel = document.getElementById('caderno-topico');
    if(sel){ for(let o of sel.options){ if(o.value===t){ o.selected=true; break; } } }
    document.getElementById('caderno-modal').style.display = 'flex';
    setTimeout(()=>document.getElementById('caderno-titulo').focus(), 100);
  };

  window.abrirNota = function(id, titulo, texto, topicoEnc){
    window._cadernoEditId = id;
    window._cadernoTopicoAtual = topicoEnc ? decodeURIComponent(topicoEnc) : 'Geral';
    document.getElementById('caderno-titulo').value = decodeURIComponent(titulo);
    document.getElementById('caderno-texto').value = decodeURIComponent(texto);
    const sel = document.getElementById('caderno-topico');
    if(sel){ for(let o of sel.options){ if(o.value===window._cadernoTopicoAtual){ o.selected=true; break; } } }
    document.getElementById('caderno-modal').style.display = 'flex';
  };

  window.fecharCaderno = function(){ document.getElementById('caderno-modal').style.display='none'; };

  window.salvarNota = async function(){
    const titulo = document.getElementById('caderno-titulo').value.trim();
    const texto  = document.getElementById('caderno-texto').value.trim();
    const sel    = document.getElementById('caderno-topico');
    const topico = sel ? sel.value : (window._cadernoTopicoAtual||'Geral');
    if(!titulo&&!texto){ showToast('Escreva algo primeiro.'); return; }
    const data = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
    try{
      if(window._cadernoEditId){
        await setDoc(doc(db,'caderno',currentUser.uid,'notas',window._cadernoEditId),{titulo,texto,topico,data,ts:Date.now()},{merge:true});
      } else {
        await addDoc(collection(db,'caderno',currentUser.uid,'notas'),{titulo,texto,topico,data,ts:Date.now()});
      }
      fecharCaderno();
      showToast('Anotação salva!');
      await renderCaderno(document.getElementById('mainContent'));
    }catch(e){ showToast('Erro ao salvar.'); }
  };

  window.deletarNota = async function(id){
    if(!confirm('Excluir esta anotação?')) return;
    try{
      await deleteDoc(doc(db,'caderno',currentUser.uid,'notas',id));
      showToast('Excluída!');
      await renderCaderno(document.getElementById('mainContent'));
    }catch(e){ showToast('Erro.'); }
  };

  window.deletarTopico = async function(tEnc){
    const t = decodeURIComponent(tEnc);
    const count = (topicos[t]||[]).length;
    if(!confirm('Excluir tópico "'+t+'"'+(count>0?' e suas '+count+' nota(s)':'')+' ?')) return;
    try{
      await Promise.all((topicos[t]||[]).map(n=>deleteDoc(doc(db,'caderno',currentUser.uid,'notas',n.id))));
      showToast('Tópico excluído!');
      await renderCaderno(document.getElementById('mainContent'));
    }catch(e){ showToast('Erro.'); }
  };

  window.exportarTopico = function(tEnc){
    const t = decodeURIComponent(tEnc);
    const notes = topicos[t]||[];
    if(notes.length===0){ showToast('Nenhuma nota para exportar.'); return; }

    // Build Word-compatible HTML
    let html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"/><title>'+t+'</title><style>'+
      'body{font-family:Arial,sans-serif;font-size:12pt;line-height:1.6;margin:2cm;}'+
      'h1{font-size:18pt;color:#8B4513;border-bottom:2px solid #c8a96e;padding-bottom:6pt;margin-top:0;}'+
      'h2{font-size:14pt;color:#5c3010;margin-top:18pt;margin-bottom:4pt;}'+
      '.data{font-size:9pt;color:#999;margin-top:-4pt;margin-bottom:8pt;}'+
      '.texto{white-space:pre-wrap;font-size:11pt;}'+
      'hr{border:none;border-top:1px solid #e8dfc8;margin:16pt 0;}'+
    '</style></head><body>'+
    '<h1>📓 '+t+'</h1>'+
    '<p style="font-size:10pt;color:#aaa;">Exportado em '+new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'})+' · '+notes.length+' nota(s)</p><hr/>'+
    notes.map((n,i)=>
      '<h2>'+(n.titulo||'Sem título')+'</h2>'+
      '<div class="data">'+(n.data||'')+'</div>'+
      '<div class="texto">'+(n.texto||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>'+
      (i<notes.length-1?'<hr/>':'')
    ).join('')+
    '</body></html>';

    const blob = new Blob(['﻿'+html], {type:'application/msword'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = t.replace(/[^a-zA-Z0-9À-ú ]/g,'_')+'.doc';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('Exportado com sucesso!');
  };
}

window.postarMural=async function(uid){
  const texto=document.getElementById('mural-texto-'+uid).value.trim();

  const data=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  try{
    await addDoc(collection(db,'mural',uid,'recados'),{
      texto,
      autorUid:currentUser.uid,
      autorNome:userProfile.nome||'?',

      ts:Date.now()

};

function slackRenderText(text){
  if(!text) return '';
  return text
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&')
    .replace(/<@([A-Z0-9]+)>/g,(m,uid)=>{const u=slackUsers[uid];return u?'<b style="color:#1264a3;">@'+(u.real_name||u.name)+'</b>':m;})
    .replace(/<#[A-Z0-9]+\|([^>]+)>/g,'<b>#$1</b>')
    .replace(/<(https?:[^|>]+)\|([^>]+)>/g,'<a href="$1" target="_blank" style="color:#1264a3;text-decoration:underline;">$2</a>')
    .replace(/<(https?:[^>]+)>/g,'<a href="$1" target="_blank" style="color:#1264a3;text-decoration:underline;">$1</a>')
    .replace(/\*([^*]+)\*/g,'<b>$1</b>')
    .replace(/_([^_]+)_/g,'<i>$1</i>')
    .replace(/~([^~]+)~/g,'<s>$1</s>')
    .replace(/`([^`]+)`/g,'<code style="background:rgba(0,0,0,0.08);padding:1px 4px;border-radius:3px;font-size:12px;">$1</code>')
    .replace(/:([a-z0-9_+\-]+)(?::skin-tone-\d)?:/gi,(m,name)=>{
      const base = name.replace(/-/g,'_').toLowerCase();
      return SLACK_EMOJI[base]||SLACK_EMOJI[name]||m;
    });
}
